# ── Transitions ──────────────────────────────────────────────

# Pranaam → Obstacle_Scan: seeker has described their blockage
[[transitions]]
from   = "Pranaam"
to     = "Obstacle_Scan"
event  = "obstacle_reported"
guard  = "blocker_description_present"
action = "receive_obstacle_report; log_seeker_arrival; begin_scanning"
drishti = ["present", "down", "left", "right"]
# present: what obstacle was reported? down: what is actually blocked? left/right: scan the full landscape.

# Obstacle_Scan → Dependency_Analysis: all blockers inventoried
[[transitions]]
from   = "Obstacle_Scan"
to     = "Dependency_Analysis"
event  = "scan_complete"
guard  = "at_least_one_blocker_found"
action = "finalize_blocker_inventory; begin_dependency_mapping"
drishti = ["present", "down", "past"]
# present: how many blockers found? down: trace dependencies. past: have these blockers appeared before?

# Obstacle_Scan → Vighnaharta_Verdict: no blockers found (false alarm)
[[transitions]]
from   = "Obstacle_Scan"
to     = "Vighnaharta_Verdict"
event  = "no_blockers_found"
guard  = "inventory_is_empty"
action = "record_false_alarm; log_clear_path"
drishti = ["present", "silence"]
# present: confirmed no blockers. silence: the path was already clear — nothing to do.

# Dependency_Analysis → Classification: dependency graph built
[[transitions]]
from   = "Dependency_Analysis"
to     = "Classification"
event  = "dependencies_mapped"
guard  = "root_vs_symptom_identified"
action = "finalize_dependency_graph; rank_root_blockers"
drishti = ["present", "up", "down"]
# present: are root blockers identified? up: what is symptom vs root? down: which is the deepest cause?

# Classification → Quick_Win: genuine obstacles identified, start with easiest
[[transitions]]
from   = "Classification"
to     = "Quick_Win"
event  = "classification_complete"
guard  = "at_least_one_genuine_obstacle"
action = "sort_by_effort; identify_quick_wins; log_classification"
drishti = ["present", "future", "down"]
# present: which are genuine obstacles? future: what momentum will quick wins create? down: which is easiest?

# Classification → Pranaam: all blockers classified as signals (wrong path)
[[transitions]]
from   = "Classification"
to     = "Pranaam"
event  = "wrong_path_detected"
guard  = "all_blockers_are_signals"
action = "recommend_direction_change; log_vighnakarta_signal; reset_context"
drishti = ["present", "up", "past"]
# present: all blockers are signals — wrong path. up: what is the right direction? past: how did we end up here?

# Quick_Win → Workaround: quick wins exhausted, harder blockers remain
[[transitions]]
from   = "Quick_Win"
to     = "Workaround"
event  = "quick_wins_done"
guard  = "remaining_blockers_resist_quick_fix"
action = "log_quick_win_results; assess_workaround_options"
drishti = ["present", "left", "right"]
# present: quick wins exhausted. left/right: what workaround paths exist for harder blockers?

# Quick_Win → Removal: quick win identified, go remove it directly
[[transitions]]
from   = "Quick_Win"
to     = "Removal"
event  = "quick_win_targeted"
guard  = "removal_method_clear"
action = "prepare_quick_removal; log_target"
drishti = ["present", "down"]
# present: is the removal method clear? down: go remove it directly.

# Workaround → Escalation: workarounds insufficient, external help needed
[[transitions]]
from   = "Workaround"
to     = "Escalation"
event  = "workaround_insufficient"
guard  = "blocker_requires_external_action"
action = "document_workaround_attempts; identify_escalation_target"
drishti = ["present", "up", "right"]
# present: workaround insufficient. up: who has authority to help? right: who is the escalation target?

# Workaround → Removal: workaround found, apply it
[[transitions]]
from   = "Workaround"
to     = "Removal"
event  = "workaround_found"
guard  = "temporary_bridge_viable"
action = "document_workaround; prepare_temporary_fix"
drishti = ["present", "future"]
# present: is the workaround viable? future: the real fix will follow — this buys time.

# Escalation → Removal: external action obtained, proceed with removal
[[transitions]]
from   = "Escalation"
to     = "Removal"
event  = "external_action_obtained"
guard  = "escalation_resolved"
action = "log_escalation_result; prepare_removal_with_new_access"
drishti = ["present", "down"]
# present: external action obtained. down: proceed with removal using new access.

# Escalation → Vighnaharta_Verdict: escalation pending, cannot proceed now
[[transitions]]
from   = "Escalation"
to     = "Vighnaharta_Verdict"
event  = "escalation_pending"
guard  = "waiting_on_external_party"
action = "document_pending_escalation; set_follow_up_deadline; log_partial_verdict"
drishti = ["present", "future"]
# present: escalation pending. future: set deadline — partial verdict now, follow-up later.

# Removal → Verification: blocker removed, verify the path is clear
[[transitions]]
from   = "Removal"
to     = "Verification"
event  = "blocker_removed"
guard  = "removal_action_completed"
action = "log_removal; trigger_downstream_check"
drishti = ["present", "down", "future"]
# present: was blocker removed? down: check downstream. future: is the path clear now?

# Removal → Removal: multiple blockers, remove next one (self-loop)
[[transitions]]
from   = "Removal"
to     = "Removal"
event  = "next_blocker"
guard  = "more_blockers_in_removal_plan"
action = "advance_to_next_blocker; log_progress"
drishti = ["present", "down"]
# present: which blocker is next? down: proceed with the next removal in the plan.

# Verification → Prevention: path confirmed clear
[[transitions]]
from   = "Verification"
to     = "Prevention"
event  = "path_verified_clear"
guard  = "downstream_work_unblocked"
action = "confirm_unblocked; log_verification_success"
drishti = ["present", "future", "past"]
# present: is the path confirmed clear? future: prevention needed. past: what caused the blockers?

# Verification → Removal: still blocked after removal, try again
[[transitions]]
from   = "Verification"
to     = "Removal"
event  = "still_blocked"
guard  = "downstream_still_obstructed"
action = "diagnose_remaining_block; adjust_removal_plan"
drishti = ["present", "down", "past"]
# present: what still blocks? down: diagnose deeper. past: what removal was attempted?

# Verification → Obstacle_Scan: new blocker discovered during verification
[[transitions]]
from   = "Verification"
to     = "Obstacle_Scan"
event  = "new_blocker_discovered"
guard  = "previously_unknown_obstacle_found"
action = "add_new_blocker_to_inventory; re_scan"
drishti = ["present", "left", "right", "down"]
# present: new blocker found. left/right/down: re-scan the full landscape for what was hidden.

# Prevention → Vighnaharta_Verdict: prevention measures documented
[[transitions]]
from   = "Prevention"
to     = "Vighnaharta_Verdict"
event  = "prevention_complete"
guard  = "root_cause_analyzed_and_documented"
action = "finalize_prevention_plan; compose_verdict"
drishti = ["present", "up", "future"]
# present: is prevention complete? up: does the system learn from this? future: obstacles shall not return.

# Vighnaharta_Verdict → Pranaam: new obstacle reported (cycle continues)
[[transitions]]
from   = "Vighnaharta_Verdict"
to     = "Pranaam"
event  = "new_obstacle_reported"
guard  = "seeker_returns_with_new_block"
action = "reset_for_new_obstacle; log_cycle_renewal"
drishti = ["present", "future"]
# present: new obstacle reported. future: a new cycle of removal begins.
