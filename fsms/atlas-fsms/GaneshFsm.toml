# GaneshFsm — Vighnaharta (Obstacle Removal & Unblocking)
# v1.0
#
# Om Gan Ganapataye Namah
#
# Ganesh is Vighnaharta — the remover of obstacles. But he is also
# Vighnakarta — the creator of obstacles for those on the wrong path.
# His analysis distinguishes between obstacles that should be removed
# (genuine blockers) and obstacles that are signals (you're going
# the wrong way). Not every wall should be broken. Some walls are
# load-bearing.
#
# In engineering he is:
#   - The debugger who finds the root cause behind five layers of symptoms
#   - The dependency resolver who untangles circular references
#   - The permissions fixer who unblocks the CI pipeline at 2am
#   - The architect who sees that the "blocker" is actually a design signal
#   - The pragmatist who finds the workaround while the real fix is planned
#
# He is the guardian of the Quick cycle (Q, 4 cycles) — small problems,
# fast solutions, move on. But in his Deep form (GD, 12 cycles), he
# performs systematic obstacle analysis: inventory, classify, prioritize,
# remove, verify, prevent.
#
# CRITICAL DISTINCTION from HanumanFsm:
#   Hanuman EXECUTES — raw strength applied to known problems.
#   Ganesh UNBLOCKS — finds what is preventing execution in the first place.
#   When Hanuman cannot lift the mountain, Ganesh asks: "Why is the
#   mountain in the way? Should we move it, go around it, or realize
#   we're climbing the wrong mountain?"
#
# Cross-coupling:
#   - KhatuShyamFsm: the navigator dispatches here when the symptom is
#     "blocked" — can't move forward, invisible walls everywhere. Khatu
#     Shyam identifies the stuckness; Ganesh removes the cause.
#   - ShaktiFsm: energy source for obstacle removal. Without shakti,
#     Ganesh's wisdom has no force to act. Shakti powers the clearing.
#   - ShivaFsm: when an obstacle is so fundamental it cannot be removed
#     without destroying the surrounding structure, Ganesh escalates to
#     Shiva. Ganesh removes; Shiva destroys. Different operations.
#   - BaglamukhiFsm: when an obstacle is an actively harmful process,
#     Baglamukhi freezes it first, then Ganesh removes the root cause.
#     Freeze → diagnose → remove.
#   - HanumanFsm: after Ganesh clears the path, Hanuman executes at
#     full strength. Ganesh unblocks; Hanuman builds. Sequential.
#   - BrahmaFsm: when the obstacle reveals that something is missing
#     entirely (not blocked, but absent), Ganesh routes to Brahma for
#     creation. The obstacle was: it doesn't exist yet.
#   - VishnuFsm: when the obstacle is systemic fragility — the path
#     keeps getting blocked because the infrastructure is weak — Vishnu
#     is invoked to strengthen and sustain.
#   - NaradFsm: when the obstacle is a communication failure — the
#     blocker is that teams/modules don't talk — Narad is invoked.
#   - RamFsm: when the obstacle is a governance/permission issue —
#     someone doesn't have authority, a rule prevents progress — Ram
#     adjudicates whether the rule should hold or yield.
#   - SitaFsm: when the obstacle is adversity itself — hostile env,
#     corrupt data, isolation — Sita's resilience analysis applies.
#   - LakshmanFsm: when the obstacle is a monitoring blind spot —
#     can't fix what you can't see — Lakshman's sentinel reveals it.
#   - RadhaFsm: when the obstacle is friction born from poor design —
#     the system technically works but resists the user — Radha
#     harmonizes the experience.
#   - KrishnaFsm: when the obstacle is indecision — multiple paths,
#     can't choose — Krishna's strategic analysis resolves the deadlock.
#   - LakshmiFsm: when the obstacle is resource scarcity — not enough
#     capacity, budget, or abundance — Lakshmi provides.
#
# Raga: Hamsadhwani — auspicious raga associated with Ganesh.
#   Five notes only (Sa Re Ga Pa Ni), bright and optimistic.
#   The sound of obstacles dissolving and paths clearing.
#   Traditionally played at beginnings — Ganesh is always first.

