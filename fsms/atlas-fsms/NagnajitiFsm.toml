#     -> Consumed by VishwakarmaFsm (parallel build strategy)
#   zero_compromise { original_spec, delivered_spec, nothing_dropped }
#     -> Consumed by RukminiFsm (strategy that doesn't compromise)
#     -> Consumed by TyagarajaFsm (structured precision meeting all requirements)
