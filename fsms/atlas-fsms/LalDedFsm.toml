#
# LalDedFsm emits:
#   stone_found { what_looked_like_truth, what_it_actually_was }
#     -> Consumed by KabirFsm (hypocrisy evidence)
#     -> Consumed by MiraFsm (rebellion fuel)
#   vakh_composed { four_lines, paradox, categories_shattered }
#     -> Consumed by OshoFsm (detonator material)
#     -> Consumed by MeeraFsm (composition with paradox energy)
#   aami_pana { universal_truth, transcends_framework }
#     -> Consumed by BuddhaFsm (emptiness validation)
#     -> Consumed by NagarjunaFsm (anti-reification)
#     -> Consumed by ThiruvalluvarFsm (universal ethics check)
#
# LalDedFsm reads from:
#   - ShivaFsm.state (Shiva everywhere — destruction as revelation)
#   - KabirFsm.state (anti-hypocrisy companion)
#   - BuddhaFsm.state (emptiness as middle way)
#   - OshoFsm.state (paradox as teaching tool)
#
# Lal Ded's Law:
#   "If your truth only works inside your framework, it is not truth.
#    If your architecture needs a vendor, it is not architecture.
#    If your song needs a label, it is not a song.
#    The stone under the rice is the world's greatest teacher:
#    it teaches you that most nourishment is fake."
#
# Anti-patterns:
#   - Paradox as cleverness = Riddle (Lal Ded's vakhs are not puzzles — they are portals)
#   - Nakedness as philosophy = Ideology (her nudity was personal freedom, not a position)
#   - Cross-tradition as dilettantism = Tourism (she didn't borrow — she transcended)
#   - Mysticism as obscurity = Hiding (her vakhs are CLEAR, just multi-layered)
#   - Emptiness as nihilism = Depression (her shunya dances — it is FULL emptiness)
