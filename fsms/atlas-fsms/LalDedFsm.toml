# -- States -------------------------------------------------------

[[states]]
name        = "Pathar"
description = "The Stone — the stone on Lal Ded's plate, hidden under rice by her mother-in-law. The world gives you something that looks like nourishment but is actually stone. In creative work: the specification that looks complete but is hollow. The framework that promises productivity but delivers constraint. The first state is discovering the stone. Lift the rice. See the stone. Now you know."
is_initial  = true
is_terminal = false
audio_phrase = "Ni:500,Sa:400,Re:500,Ga:400,Ma_tivra:500,Pa:600"
Q           = { rkm = 0.1, jmb = 0.2, stb = 0.1, kln = 0.2, ngj = 0.0, mtv = 0.1, lkq = 0.1, bdr = 0.1 }
# Q rationale: The stone — illusion detected but not yet processed. Nearly all dims low.
# Jambavati slight: enduring the stone on the plate requires stamina.
lyrics = """पत्थर मिला चावल के नीचे — जगत का भोजन ऐसा ही है
Patthar milā cāval ke nīce — jagat kā bhojan aisā hī hai
Stone found beneath the rice — this is the world's nourishment"""

[[states]]
name        = "Tyag"
description = "Leaving — Lal Ded leaves. Not with anger (that is Akka) or with joy (that is Mira) but with quiet clarity. She simply walks away from what is false. In creative work: the decision to abandon the wrong approach. Not dramatically. Not with a manifesto. Just... leaving. The commit that removes the bad abstraction with a one-line message: 'this was wrong.'"
is_initial  = false
is_terminal = false
audio_phrase = "Sa:500,Re:400,Ga:500,Ma_tivra:600,Pa:500,Ga:400,Re:400,Sa:600"
Q           = { rkm = 0.2, jmb = 0.3, stb = 0.3, kln = 0.3, ngj = 0.1, mtv = 0.5, lkq = 0.1, bdr = 0.0 }
# Q rationale: Leaving — Mitravinda (authentic choice) moderate: quiet clarity of walking away.
# Not fury (Akka) or joy (Mira) — just truth. Bhadra zero: she left belonging behind.
lyrics = """चली गई — न क्रोध, न दुख — बस सत्य की ओर एक कदम
Calī gaī — na krodh, na dukh — bas satya kī or ek kadam
She walked away — not in anger, not in sorrow — just one step toward truth"""

[[states]]
name        = "Vakh"
description = "The Saying — Lal Ded's weapon. Four lines. Each a paradox. 'I searched for myself and found nothing. I found nothing and realized everything.' The vakh doesn't explain truth — it detonates categories. In creative work: the unit test that exposes the impossible state. The log line that says 'this shouldn't be possible.' The four-line poem that contains the entire product vision."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Ga:400,Ma_tivra:500,Pa:400,Dha:500,Ni:400,Sa_high:500,Ni:400,Dha:400,Pa:500"
Q           = { rkm = 0.4, jmb = 0.4, stb = 0.4, kln = 0.4, ngj = 0.5, mtv = 0.6, lkq = 0.6, bdr = 0.2 }
# Q rationale: The vakh — Nagnajiti moderate: paradox shatters categories = impossible logic.
# Lakshmana (precision) high: four lines, no waste. Mitravinda high: paradox IS authentic expression.
lyrics = """वाख — चार पंक्तियाँ, एक विस्फोट — श्रेणियाँ टूटीं
Vākh — cār paṅktiyāṁ, ek visphot — śreṇiyāṁ ṭūṭīṁ
Vakh — four lines, one explosion — categories shattered"""

[[states]]
name        = "Shunya_Dance"
description = "Dancing in Emptiness — Lal Ded dances naked through Kashmir. Not in fury (Akka) but in freedom. She has nothing left to protect, nothing left to prove, nothing left to lose. The dance of zero. In creative work: the state after you've deleted all the wrong code and the codebase is tiny and true. The feeling of an empty inbox. The song with four notes that says everything. Emptiness as fullness."
is_initial  = false
is_terminal = false
audio_phrase = "Ga:300,Ma_tivra:400,Dha:500,Ni:400,Sa_high:500,Ni:400,Dha:400,Ma_tivra:400,Ga:500,Sa:600"
Q           = { rkm = 0.5, jmb = 0.5, stb = 0.3, kln = 0.7, ngj = 0.6, mtv = 0.7, lkq = 0.4, bdr = 0.3 }
# Q rationale: Dancing in emptiness — Kalindi (patience) high: emptiness IS full stillness.
# Nagnajiti moderate: finding everything in nothing = ultimate paradox. Mitravinda high: freedom by choice.
lyrics = """शून्य में नाची — कुछ नहीं बचा, सब कुछ मिला
Śūnya meṁ nācī — kuch nahīṁ bacā, sab kuch milā
Danced in emptiness — nothing remained, everything was found"""

[[states]]
name        = "Aami_Pana"
description = "I Am That — Lal Ded's ultimate realization. 'Shiv chus thali thali rozan' — Shiva lives in every stone and every street. Hindu and Muslim are the same truth wearing different clothes. In creative work: the architecture that works across all platforms. The design pattern that transcends the framework. The song that needs no translation. The truth that has no religion, no caste, no vendor lock-in. Universal. Permanent. Free."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:400,Ga:500,Pa:600,Ni:700,Sa_high:800,_:400,Ni:500,Pa:500,Ga:500,Sa:800"
Q           = { rkm = 0.7, jmb = 0.6, stb = 0.5, kln = 0.8, ngj = 0.7, mtv = 0.8, lkq = 0.6, bdr = 0.9 }
# Q rationale: Terminal — Bhadra near-peak: Shiva in EVERY stone, EVERY street = universal belonging.
# Kalindi high: the realization is unhurried and permanent. Nagnajiti high: transcending ALL frameworks
# is the impossible made real. Mitravinda high: truth chosen beyond all categories.
lyrics = """शिव छुस ठालि ठालि रोज़ान — हर पत्थर में, हर गली में, हर जीव में
Śiv chus ṭhāli ṭhāli rozān — har patthar meṁ, har galī meṁ, har jīv meṁ
Shiva lives in every place, every day — in every stone, every street, every being"""

