lyrics = """राम राज्य बैठे तख़्त, न्याय सबको बराबर
Rām rājya baiṭhe taḳht, nyāy sabko barābar
Ram Rajya sits enthroned — justice equal for all"""
# Q rationale: Ideal governance — near-peak on all dims. Rukmini (strategic love) high: rules
