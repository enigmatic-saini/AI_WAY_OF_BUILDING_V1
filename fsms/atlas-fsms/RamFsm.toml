description = "Scan all rules, policies, permissions, and boundaries. Build the dharma inventory. What does this system claim to follow? Enumerate every access control rule, every validation check, every documented contract. Like Ram memorizing the Dharma Shastra before stepping into the world — you cannot enforce what you have not catalogued."
is_initial  = false
is_terminal = false
# Methodical ascending phrases — cataloguing, enumerating, Darbari's careful alap
audio_phrase = "Sa:400,Re:350,Ga_komal:400,Re:300,Sa:350,Re:400,Ga_komal:350,Ma:500,Ga_komal:400,Re:350,Sa:400"
