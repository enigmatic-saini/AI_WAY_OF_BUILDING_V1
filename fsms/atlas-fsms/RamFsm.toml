Q = { rkm = 0.8, jmb = 0.8, stb = 0.8, kln = 0.6, ngj = 0.7, mtv = 1.0, lkq = 0.9, bdr = 0.5 }

# ── Transitions ──────────────────────────────────────────────────

# Ayodhya → Maryada_Scan: a governance review is requested, the audit begins
[[transitions]]
from   = "Ayodhya"
to     = "Maryada_Scan"
event  = "audit_begins"
guard  = "governance_review_requested"
action = "load_system_constitution; enumerate_rule_sources; log_audit_start"
drishti = ["present", "down", "right"]
# present: is a governance review genuinely needed? down: what are the actual rules? right: what systems are in scope?

# Maryada_Scan → Enforcement_Audit: all rules catalogued, now check enforcement
[[transitions]]
from   = "Maryada_Scan"
to     = "Enforcement_Audit"
event  = "rules_catalogued"
guard  = "dharma_inventory_complete"
action = "freeze_rule_catalogue; begin_enforcement_checks; log_scan_complete"
drishti = ["present", "down", "past"]
# present: is the catalogue complete? down: where does enforcement actually live in code? past: were rules followed before?

# Enforcement_Audit → Vanvas: enforcement checked, adversity test needed
# The system claims to follow rules — but does it hold under pressure?
[[transitions]]
from   = "Enforcement_Audit"
to     = "Vanvas"
event  = "enforcement_checked"
guard  = "adversity_test_needed"
action = "prepare_chaos_scenarios; snapshot_current_state; log_entering_exile"
drishti = ["present", "future", "down"]
# present: are we ready for the exile test? future: what adversity scenarios await? down: what might break?

# Enforcement_Audit → Lakshman_Rekha: shortcut when no adversity test needed
# Some audits only need boundary verification, not full stress testing
[[transitions]]
from   = "Enforcement_Audit"
to     = "Lakshman_Rekha"
event  = "enforcement_checked"
guard  = "boundaries_need_verification"
action = "load_boundary_definitions; prepare_limit_checks; log_skipping_to_rekha"
drishti = ["present", "left", "right"]
# present: do we need boundary checks? left/right: scan laterally for all boundary definitions.

# Vanvas → Alliance_Forge: adversity survived, now verify trust boundaries
# The system held under pressure — but who did it lean on?
[[transitions]]
from   = "Vanvas"
to     = "Alliance_Forge"
event  = "adversity_survived"
guard  = "system_maintained_dharma_under_pressure"
action = "record_resilience_results; enumerate_dependencies; log_exile_survived"
drishti = ["present", "right", "future"]
# present: did dharma hold under pressure? right: who did we lean on? future: are these allies trustworthy going forward?

# Vanvas → Lanka_March: adversity failed, violations found under pressure
# The system broke its own rules when stressed — go directly to confrontation
[[transitions]]
from   = "Vanvas"
to     = "Lanka_March"
event  = "adversity_failed"
guard  = "violations_found_under_pressure"
action = "record_failure_evidence; prepare_violation_report; log_exile_failure"
drishti = ["present", "down", "past"]
# present: what broke? down: the evidence of failure. past: what should have held but didn't?

# Alliance_Forge → Lakshman_Rekha: alliances verified, now check absolute limits
[[transitions]]
from   = "Alliance_Forge"
to     = "Lakshman_Rekha"
event  = "alliances_verified"
guard  = "dependency_contracts_assessed"
action = "record_alliance_status; load_boundary_definitions; log_alliances_done"
drishti = ["present", "left", "right", "down"]
# present: are all alliances verified? left/right: scan for all boundary definitions. down: where are the limits enforced?

# Lakshman_Rekha → Lanka_March: boundaries assessed, proceed to confrontation
[[transitions]]
from   = "Lakshman_Rekha"
to     = "Lanka_March"
event  = "boundaries_assessed"
guard  = "all_limits_checked"
action = "compile_boundary_report; merge_with_audit_findings; log_boundaries_done"
drishti = ["present", "future", "up"]
# present: are all limits checked? future: what confrontation awaits? up: how do findings align with system purpose?

# Lakshman_Rekha → Lakshman_Rekha: self-loop for each boundary violation found
# Each breach of the Rekha is examined individually — not batched, not glossed over
[[transitions]]
from   = "Lakshman_Rekha"
to     = "Lakshman_Rekha"
event  = "rekha_breached"
guard  = "boundary_violation_found"
action = "record_violation_detail; assess_severity; increment_violation_count; log_rekha_breach"
drishti = ["present", "down"]
# present: what boundary was breached? down: examine this specific violation in full detail.

# Lanka_March → Ram_Rajya: confrontation complete, assess ideal governance
[[transitions]]
from   = "Lanka_March"
to     = "Ram_Rajya"
event  = "confrontation_complete"
guard  = "all_violations_addressed"
action = "finalize_violation_report; begin_governance_assessment; log_lanka_complete"
drishti = ["present", "up", "future"]
# present: are all violations addressed? up: what does ideal governance look like? future: can this system achieve Ram Rajya?

# Ram_Rajya → Dharma_Verdict: governance assessed, render the verdict
[[transitions]]
from   = "Ram_Rajya"
to     = "Dharma_Verdict"
event  = "governance_assessed"
guard  = "ram_rajya_criteria_evaluated"
action = "compute_dharma_score; render_verdict; log_governance_assessed"
drishti = ["present", "up", "past", "future"]
# present: is the governance assessment complete? up: does this serve the governed? past: what was the full audit journey? future: what verdict serves truth?

# Dharma_Verdict → Ayodhya: the cycle completes — system returns to peace
# Every audit ends where it began. The city is the same; the knowledge is new.
[[transitions]]
from   = "Dharma_Verdict"
to     = "Ayodhya"
event  = "new_cycle"
guard  = "system_returns_to_peace"
action = "archive_audit_results; reset_audit_context; log_cycle_complete"
drishti = ["present", "future", "silence"]
# present: is the cycle truly complete? future: the system returns to peace. silence: rest between audits.

# ── Cross-coupling signals ───────────────────────────────────────
#
# RamFsm emits:
#   dharma_audit_complete { verdict: "dharmic|adharmic|praayashchit",
#                           score: 0.0..1.0,
#                           violations: [...],
#                           governance_grade: "A-F" }
#   → Consumed by KhatuShyamFsm for cycle completion tracking
#   → Consumed by ThoughtCycleFsm for system health assessment
#
#   boundary_check_request { boundaries: [...] }
#   → Dispatched to LakshmanFsm for detailed enforcement verification
#
#   adversity_test_request { scenarios: [...], duration: "..." }
#   → May invoke SitaFsm resilience patterns for stress-test design
#
#   violation_remediation { violation_id: "...", severity: "...", fix: "..." }
#   → Dispatched to HanumanFsm for execution
#
# RamFsm reads from:
#   - KhatuShyamFsm.dispatch (receives governance-type problems)
#   - LakshmanFsm.state (boundary enforcement status)
#   - SitaFsm.state (resilience/adversity patterns)
#   - HanumanFsm.state (remediation execution status)
#   - ConfigGovernanceFsm (system configuration rules)
#
# ── Design notes ─────────────────────────────────────────────────
#
# The Vanvas state deserves special emphasis: it is the adversity
# simulation, NOT punishment. In Ram's story, exile was the forge
# that proved his dharma was real, not performative. In systems
# terms: chaos engineering, fault injection, degraded-mode testing.
# A system that only follows its rules in production-happy-path
# is not dharmic — it is lucky.
#
# The Lakshman_Rekha self-loop is deliberate: boundary violations
# are examined one at a time, with full evidence, not batch-dismissed.
# Each breach gets its own cycle through the state, its own severity
# assessment, its own record. This mirrors how Ram treated each
# situation on its own merit — no blanket judgments.
#
# Ram Rajya is the aspirational state, not a checkbox. The question
# is not "did we fix the bugs?" but "would we be proud if every
# system in the world worked this way?" Succession planning,
# knowledge sharing, traceability, equal treatment — these are
# the Ram Rajya criteria.
