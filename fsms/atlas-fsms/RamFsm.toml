description = "For each catalogued rule: is it enforced in code or only in documentation? Are there backdoors, special cases, admin overrides that break the contract? A rule that exists only in a README is no rule at all — it is a wish. Ram did not merely know dharma; he lived it. This state separates law-on-paper from law-in-practice."
is_initial  = false
is_terminal = false
# Probing, questioning phrases — Darbari's characteristic andolan on Ga_komal
audio_phrase = "Ga_komal:500,Ma:400,Pa:450,Ma:350,Ga_komal:500,Re:400,Ga_komal:600"
lyrics = """लिखा है तो क्या, चला भी है क्या? नियम परखो
Likhā hai to kyā, chalā bhī hai kyā? Niyam parkho
Written is one thing — is it followed? Test the rules"""
# Q rationale: Probing enforcement. Satyabhama (fierce pride) rising: fearless questioning.
# Lakshmana (precision) high: checking each rule with exactitude. Mitravinda (authentic choice):
# separating law-on-paper from law-in-practice requires honesty.
Q = { rkm = 0.5, jmb = 0.4, stb = 0.5, kln = 0.5, ngj = 0.5, mtv = 0.5, lkq = 0.7, bdr = 0.3 }

[[states]]
name        = "Vanvas"
description = "The exile test — remove key components, simulate adversity, inject failures. Does the system maintain dharma under pressure? Can it survive 14 years in the forest? This is NOT punishment — it is purification through trial. Ram's exile was not Kaikeyi's cruelty; it was the universe asking: does dharma hold when comfort is stripped away? Chaos engineering, resilience testing, degraded-mode compliance — all live here. Cross-ref: SitaFsm's resilience model for adversity patterns."
is_initial  = false
is_terminal = false
# Austere, sparse phrases — the forest, deprivation, Darbari turning inward
audio_phrase = "Sa:500,Re:400,Ga_komal:600,Re:500,Sa:400,Ni_komal_mandra:500,Sa:700"
lyrics = """वनवास है परीक्षा, दंड नहीं — तपस्या है
Vanvās hai parīkṣā, daṇḍ nahīṁ — tapasyā hai
Exile is a test, not punishment — it is penance"""
# Q rationale: Adversity test — Jambavati (endurance) peak: 14 years of exile. Satyabhama
# (fierce pride) high: dharma held under pressure. Kalindi (patience) high: enduring without
# complaint. Bhadra (belonging) drops: exile IS removal from home. Nagnajiti high: surviving
# impossible conditions.
Q = { rkm = 0.5, jmb = 0.9, stb = 0.7, kln = 0.7, ngj = 0.7, mtv = 0.6, lkq = 0.5, bdr = 0.1 }

[[states]]
name        = "Alliance_Forge"
description = "Trust boundaries — who does the system trust? Are alliances (API contracts, service dependencies, third-party integrations) formal and explicit like Ram-Sugriva pact, or assumed and fragile like Ravana's with his own brothers? Every dependency must be a treaty, not an assumption. Are SLAs defined? Are fallback paths documented? Does the alliance have mutual obligations?"
is_initial  = false
is_terminal = false
# Dialogic phrases — call and response, two voices agreeing, Darbari's sthayi
audio_phrase = "Sa:350,Ma:400,Pa:450,Ma:350,Pa:400,Dha_komal:500,Pa:400,Ma:350,Pa:500"
lyrics = """मित्रता का वचन दो, राम-सुग्रीव सा
Mitratā kā vachan do, Rām-Sugrīv sā
Give the word of friendship — like Ram and Sugriva"""
# Q rationale: Trust verification. Rukmini (strategic love) high: alliances require strategic
# affection. Mitravinda (authentic choice) high: choosing allies deliberately. Bhadra (belonging)
# rising: building the coalition. Lakshmana (precision) moderate: checking SLAs and contracts.
Q = { rkm = 0.7, jmb = 0.5, stb = 0.4, kln = 0.5, ngj = 0.5, mtv = 0.7, lkq = 0.5, bdr = 0.5 }

[[states]]
name        = "Lakshman_Rekha"
description = "The absolute lines — maximum limits, forbidden operations, security boundaries, rate limits, resource ceilings. Are they enforced at code level or merely documented? The Lakshman Rekha is the line that must never be crossed. When it is crossed, the system must detect and respond — not silently allow. Self-loop on boundary violations: each breach is examined individually. Cross-ref: LakshmanFsm for detailed boundary enforcement verification."
is_initial  = false
is_terminal = false
# Sharp, decisive phrases — the line drawn, absolute, Darbari's mukhda
audio_phrase = "Pa:400,Dha_komal:350,Ni_komal:400,Sa_high:500,Ni_komal:350,Dha_komal:400,Pa:500"
lyrics = """लक्ष्मण रेखा लाँघे कोई, विनाश निश्चित होई
Lakṣmaṇ Rekhā lāṅghe koī, vināś niścit hoī
Whoever crosses the Lakshman Rekha — destruction is certain"""
# Q rationale: Absolute boundaries. Lakshmana (precision) at peak: the line is surgical. Satyabhama
# (fierce pride) high: no compromise on limits. Nagnajiti (impossible spec) high: the Rekha IS
# the spec that must not be violated. Kalindi low: this is decisive action, not contemplation.
Q = { rkm = 0.5, jmb = 0.6, stb = 0.8, kln = 0.3, ngj = 0.8, mtv = 0.6, lkq = 1.0, bdr = 0.4 }

[[states]]
name        = "Lanka_March"
description = "The confrontation — take the findings and face the violations. No softening, no excuses, no 'we will fix it later'. Every violation is named, evidence cited, severity assessed. Ram did not negotiate with adharma — he marched to Lanka. This state produces the violation report: what is broken, where, how badly, and what the consequence should be. Cross-ref: HanumanFsm carries the message and executes remediation."
is_initial  = false
is_terminal = false
# War drums — powerful, ascending, Darbari at full force
audio_phrase = "Sa:300,Ma:300,Pa:350,Dha_komal:300,Pa:300,Ma:350,Pa:400,Dha_komal:350,Ni_komal:400,Sa_high:500"
lyrics = """लंका कूच करो, अधर्म से लड़ो, पीछे न हटो
Laṅkā kūch karo, adharm se laḍo, pīche na haṭo
March to Lanka, fight adharma, never retreat"""
# Q rationale: Confrontation — naming violations. Satyabhama (fierce pride) at peak: no softening.
# Jambavati (endurance) high: the march is long. Rukmini (strategic love) moderate: confrontation
