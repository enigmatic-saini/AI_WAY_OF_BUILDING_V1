# RamFsm — Dharma & Governance / Maryada Purushottam
# v1.0
#
# रघुकुल रीत सदा चली आई, प्राण जाय पर वचन न जाई
# The tradition of Raghu's lineage has always been:
# Let life depart, but never the given word.
#
# Shri Ram is Dharma incarnate — the one who follows boundaries
# perfectly. Not because he cannot break them, but because he
# chooses not to. Maryada (boundary) is not a cage; it is the
# architecture of trust.
#
# This FSM governs: rule enforcement, compliance auditing,
# governance review, access control verification, and moral
# correctness of any system under review.
#
# The journey follows Ram's own life as a governance metaphor:
#   Ayodhya (peace) → Rule scan → Enforcement audit →
#   Exile (adversity test) → Alliance verification →
#   Boundary enforcement → Confrontation → Ideal governance →
#   Final verdict
#
# ── Cross-coupling ──────────────────────────────────────────────
#
# KhatuShyamFsm dispatches here when the symptom is:
#   - Governance violation / compliance drift
#   - Access control confusion
#   - Rule-doc mismatch (rules exist on paper but not in code)
#   - Boundary erosion over time
#   KhatuShyam's cycle_domain_map entry: RamD → RamFsm (dharma domain)
#
# LakshmanFsm — Lakshman is Ram's boundary enforcer. The
#   Lakshman_Rekha state in this FSM directly corresponds to
#   LakshmanFsm's core purpose. When RamFsm enters Lakshman_Rekha,
#   it may dispatch boundary-specific checks to LakshmanFsm for
#   detailed enforcement verification.
#
# SitaFsm — Sita endured the agni pariksha, exile, and separation.
#   The Vanvas state (adversity simulation) draws from SitaFsm's
#   resilience model. Vanvas is NOT punishment — it is purification
#   through trial, just as Sita's fire-walk proved purity through
#   ordeal, not guilt.
#
# HanumanFsm — Ram's devoted executor. When Lanka_March identifies
#   violations, HanumanFsm carries the message and executes the fix.
#   Ram decides; Hanuman acts.
#
# ── Raga ────────────────────────────────────────────────────────
# Raga Darbari Kanada — the raga of the royal court. Gravity,
# dignity, slow deliberation. Sa-Re-Ga(komal)-Ma-Pa-Dha(komal)-Ni(komal).
# Dhrupad-style gravity throughout. Sa-Pa-Sa foundation for
# the noble, unwavering character of Maryada Purushottam.

[meta]
name        = "RamFsm"
domain      = "dharma-governance"
version     = "1.1"
parent      = ""
persist     = "persistent"
generation  = 1
last_author = "divine-council"
status      = "approved"

# ── States ───────────────────────────────────────────────────────

[[states]]
name        = "Ayodhya"
description = "The golden city — system at peace. All rules are documented, governance is clear, roles are defined, permissions are explicit. This is the starting point of any dharma audit: first understand the ideal state. What does this system claim its rules are? What constitution has it written for itself? Ayodhya is not naivety — it is the baseline against which all deviations will be measured."
is_initial  = true
is_terminal = false
# Regal Sa-Pa-Sa foundation — the court at dawn, Darbari opening
audio_phrase = "Sa:600,Pa:500,Sa_high:600,Pa:400,Dha_komal:500,Pa:400,Sa:800"
lyrics = """रघुवर की लीला न्यारी, अयोध्या नगरी प्यारी
Raghuvar kī līlā nyārī, Ayodhyā nagrī pyārī
Wondrous are the ways of Raghuvar — beloved is the city of Ayodhya"""
# Q rationale: Initial peace — the ideal baseline. Bhadra (belonging) high: Ayodhya IS home.
# Kalindi (patient contemplation) moderate: understanding what the rules claim to be.
# Most action dims low: the audit has not begun, nothing is yet tested or proven.
