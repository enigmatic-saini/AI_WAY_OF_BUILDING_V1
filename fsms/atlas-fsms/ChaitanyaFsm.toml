# -- Cross-coupling signals ----------------------------------------
#
# ChaitanyaFsm emits:
#   kirtan_started { location, initial_voices, mantra }
#     -> Consumed by NaradFsm (broadcast signal)
#     -> Consumed by RadhaFsm (harmony check on collective)
#   collective_trance { participant_count, energy_level, mantra_cycles }
#     -> Consumed by MeeraFsm (collective composition fuel)
#     -> Consumed by ShaktiFsm (collective shakti measurement)
#   chariot_stopped { creation_that_stopped_the_world, impact_evidence }
#     -> Consumed by KrishnaFsm (strategic impact assessment)
#     -> Consumed by SaraswatiFsm (document the phenomenon)
#
# ChaitanyaFsm reads from:
#   - MeeraFsm.state (solo compositions to convert to collective)
#   - KabirFsm.state (simplicity level — is the mantra simple enough?)
#   - NaradFsm.state (communication channels for kirtan broadcast)
#   - RadhaFsm.state (harmony — is the collective in tune?)
#
# Chaitanya's Law:
#   "Devotion shared is devotion multiplied.
#    The song that only one person can sing is a solo.
#    The song that everyone can sing is a revolution.
#    Give your creation away. Let everyone sing it.
#    That is how a mantra becomes a movement."
#
# Anti-patterns (what Chaitanya is NOT):
#   - Mob mentality without consciousness = Riot (Chaitanya's crowds were joyful, not angry)
#   - Repetition without depth = Mindless chanting (the mantra carries meaning)
#   - Ecstasy without foundation = Hysteria (Chaitanya was a scholar first)
#   - Collective without individual = Cult (Chaitanya freed people, didn't bind them)
#   - Open-source without quality = Dumping (the kirtan was beautiful, not just loud)
