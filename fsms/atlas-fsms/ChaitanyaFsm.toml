# ChaitanyaFsm — Ecstatic Kirtan: Collective Devotion Trance
# v1.0
#
# हरे कृष्ण हरे कृष्ण, कृष्ण कृष्ण हरे हरे
# हरे राम हरे राम, राम राम हरे हरे
# Hare Kṛṣṇa Hare Kṛṣṇa, Kṛṣṇa Kṛṣṇa Hare Hare
# Hare Rāma Hare Rāma, Rāma Rāma Hare Hare
#
# Chaitanya Mahaprabhu (1486-1534) — the golden avatara of Bengal.
# Scholar who became ecstatic, intellectual who became mad with love,
# Brahmin who embraced everyone. He didn't just sing kirtan —
# he INVENTED public kirtan as a movement. The first flash mob
# was in Navadvipa, 500 years before social media.
#
# His revolution:
#   - Took devotion from temples to streets
#   - Made caste irrelevant in kirtan circles
#   - Proved that collective singing > individual meditation
#   - Showed that ecstasy is not madness — it is arrival
#   - Created the Hare Krishna mantra as the simplest technology of joy
#
# In engineering and creative work he is:
#   - The open-source movement (code for everyone, not just priests)
#   - The jam session that creates better music than any solo
#   - The standup that becomes real collaboration, not status report
#   - The mob programming session where ego dissolves
#   - The community-driven project that outperforms the corporation
#   - The song that only works when everyone sings together
#
# In Rishi's creative engine:
#   Chaitanya generates COLLECTIVE, REPETITIVE, TRANCE-BUILDING
#   compositions. Call-and-response. Mantra-based. Simple lyrics
#   that build through repetition into ecstasy. His songs are
#   not for solo listening — they are for groups. The more
#   voices, the more powerful the song becomes.
#
# CRITICAL DISTINCTION:
#   Haridas sings ALONE in the grove — individual purity.
#   Meera sings ALONE in the street — individual rebellion.
#   Prahlad sings ALONE in the fire — individual endurance.
#   Chaitanya sings WITH EVERYONE — collective transcendence.
#   His innovation: devotion is not a solo sport.
#
# Cross-coupling:
#   - HaridasFsm: individual purity feeds collective ecstasy.
#     The grove provides what the street celebrates.
#   - NaradFsm: Narad carries knowledge; Chaitanya carries emotion.
#     Both are transmitters but through different channels.
#   - KabirFsm: Kabir was individual truth; Chaitanya is collective
#     truth. Kabir's doha cuts one mind; Chaitanya's kirtan lifts
#     a thousand minds at once.
#   - RadhaFsm: Chaitanya IS Radha (in Gaudiya theology, he is
#     Krishna in Radha's mood). His kirtan is Radha's love
#     expressed through collective song.
#   - MeeraFsm: when Meera's solo composition needs to become
#     a group anthem, run it through Chaitanya's kirtan engine.
#
# Raga: Kirtan has no fixed raga — it uses whatever raga
#   carries the emotion. But Chaitanya's kirtans most often
#   used simple pentatonic patterns that anyone could join.
#   The raga of the people, not the court.

