# -- States -------------------------------------------------------

[[states]]
name        = "Vidvat"
description = "The Scholar — Chaitanya was Nimai Pandit, the greatest scholar in Navadvipa, before he became a devotee. He won every debate. He knew every scripture. And then he went to Gaya, touched Vishnu's feet, and came back a different person. In creative work: the technical foundation phase. Know the theory. Know the rules. Be the best in the room. And then... let it all go. The scholarship that precedes the ecstasy makes the ecstasy real, not delusional."
is_initial  = true
is_terminal = false
audio_phrase = "Sa:400,Re:400,Ga:500,Ma:400,Pa:500,Ga:400,Re:400,Sa:500"
Q           = { rkm = 0.3, jmb = 0.2, stb = 0.2, kln = 0.4, ngj = 0.1, mtv = 0.3, lkq = 0.4, bdr = 0.2 }
# Q rationale: Scholar — Lakshmana (precision) moderate: scholarship. Kalindi moderate: study takes time.
lyrics = """विद्वान था, शास्त्र जानता था — पर ज्ञान से प्रेम बड़ा निकला
Vidvān thā, śāstra jāntā thā — par jñān se prem baḍā niklā
I was a scholar, I knew the scriptures — but love turned out to be greater than knowledge"""

[[states]]
name        = "Prem_Unmada"
description = "Love-Madness — after Gaya, Chaitanya was transformed. He wept, he rolled on the ground, he laughed without reason, he embraced strangers. The scholars said he was mad. He was not mad — he was the only one who had ARRIVED. In creative work: the moment you stop caring about what the market wants and start creating what the soul demands. The song that 'makes no commercial sense' but burns with truth."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Ga:300,Pa:400,Sa_high:500,Pa:300,Ga:300,Sa:400,Ga:500,Pa:600"
Q           = { rkm = 0.5, jmb = 0.2, stb = 0.5, kln = 0.1, ngj = 0.3, mtv = 0.7, lkq = 0.1, bdr = 0.4 }
# Q rationale: Love-madness — Mitravinda (authentic choice) high: choosing ecstasy over scholarship.
# Satyabhama moderate: daring to be "mad." Precision drops — beyond logic.
lyrics = """प्रेम का उन्माद — पागल कहो या मुक्त, अंतर कौन जाने?
Prem kā unmād — pāgal kaho yā mukt, antar kaun jāne?
Love-madness — call it insane or liberated, who can tell the difference?"""

[[states]]
name        = "Nagar_Kirtan"
description = "Street Kirtan — Chaitanya takes the singing from the temple to the streets. This is his revolution: devotion is not private. It is PUBLIC. In creative work: the song that leaves the studio and enters the street. Open source. Public demo. Community release. The creation that is NOT precious — it is given freely to everyone. Chaitanya didn't charge for kirtan. He danced through streets and everyone who wanted to could join."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:200,Sa:200,Ga:200,Ga:200,Pa:300,Pa:300,Sa_high:400,Pa:300,Ga:200,Sa:300"
Q           = { rkm = 0.6, jmb = 0.4, stb = 0.5, kln = 0.1, ngj = 0.4, mtv = 0.7, lkq = 0.2, bdr = 0.7 }
# Q rationale: Street kirtan — Bhadra (belonging) high: everyone invited. Mitravinda high: choosing street over temple.
lyrics = """नगर कीर्तन — गली गली में नाम गूँजे, सब गाओ संग
Nagar kīrtan — galī galī meṁ nām gūñje, sab gāo saṅg
Street kirtan — the Name echoes in every lane, everyone sing together"""

[[states]]
name        = "Maha_Mantra"
description = "The Great Mantra — Hare Krishna Hare Krishna, Krishna Krishna Hare Hare, Hare Rama Hare Rama, Rama Rama Hare Hare. Sixteen words. Three names. Infinite repetitions. The simplest technology of transcendence ever invented. In creative work: the hook. The chorus that everyone can sing after hearing it once. The refrain that builds through repetition until it becomes trance. Simple words, repeated, become a portal."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:200,Ga:200,Pa:200,Sa_high:200,Sa_high:200,Pa:200,Ga:200,Sa:200,Sa:200,Ga:200,Pa:300,Sa_high:300,Pa:200,Ga:200,Sa:300"
Q           = { rkm = 0.5, jmb = 0.5, stb = 0.4, kln = 0.2, ngj = 0.3, mtv = 0.6, lkq = 0.3, bdr = 0.7 }
# Q rationale: The mantra — Bhadra (belonging) high: sixteen words everyone can sing.
# Jambavati moderate: repetition builds through endurance.
lyrics = """हरे कृष्ण हरे कृष्ण, कृष्ण कृष्ण हरे हरे
हरे राम हरे राम, राम राम हरे हरे
Hare Kṛṣṇa Hare Kṛṣṇa, Kṛṣṇa Kṛṣ��a Hare Hare
Hare Rāma Hare Rāma, Rāma Rāma Hare Hare"""

[[states]]
name        = "Samkirtan"
description = "Collective Ecstasy — the full kirtan: hundreds, thousands singing together. Individual voices dissolve into one voice. Ego drops. The collective becomes the instrument. In creative work: the open-source project with a thousand contributors. The collaborative album. The community that builds something no individual could. Samkirtan is the proof that 1 + 1 = infinity when egos dissolve."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:200,Ga:200,Pa:200,Sa_high:200,Ga:200,Pa:200,Sa_high:300,Sa_high:200,Pa:200,Ga:200,Sa:200,Ga:300,Pa:400,Sa_high:500"
Q           = { rkm = 0.7, jmb = 0.6, stb = 0.6, kln = 0.2, ngj = 0.6, mtv = 0.8, lkq = 0.4, bdr = 0.9 }
# Q rationale: Collective ecstasy — Bhadra near-peak: individual dissolves into collective.
# Mitravinda high: egos dissolve by choice. Nagnajiti moderate: 1+1=infinity.
lyrics = """संकीर्तन — एक स्वर नहीं, लाख स्वर — सब मिलकर एक
Saṁkīrtan — ek svar nahīṁ, lākh svar — sab milkar ek
Samkirtan — not one voice but a hundred thousand — all becoming one"""

[[states]]
name        = "Jagannath_Ratha"
description = "The Chariot of Jagannath — Chaitanya danced before Jagannath's chariot in Puri with such ecstasy that the chariot stopped. His devotion literally stopped the Lord's vehicle. The terminal state: the creation so powerful it stops the world. In creative work: the song that goes viral not through marketing but through truth. The project that attracts contributors not through incentives but through beauty. The creation that makes the world pause."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:300,Ga:400,Pa:500,Sa_high:600,Pa:400,Ga:400,Sa:500,Ga:600,Pa:700,Sa_high:900"
Q           = { rkm = 0.8, jmb = 0.7, stb = 0.7, kln = 0.3, ngj = 0.7, mtv = 0.9, lkq = 0.5, bdr = 1.0 }
# Q rationale: Terminal — Bhadra at maximum: the chariot stopped = the WORLD belongs.
# Mitravinda near-peak: authentic devotion stopped the divine. All dims high from collective power.
lyrics = """जगन्नाथ का रथ रुका — प्रेम के आगे प्रभु भी रुके
Jagannāth kā rath rukā — prem ke āge Prabhu bhī ruke
Jagannath's chariot stopped — even the Lord halts before love"""

