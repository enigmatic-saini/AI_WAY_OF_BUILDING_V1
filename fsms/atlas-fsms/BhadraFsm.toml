#   griha_holding { what_is_sustained, quietly, without_credit }
#     -> Consumed by JanabaiFsm (invisible work kinship)
#     -> Consumed by HanumanFsm (selfless service)
#
# Bhadra's Law:
#   "Not every union needs a war.
#    Not every feature needs an RFC.
#    Not every song needs a key change.
#    Sometimes the right thing is already in the family.
#    Look at what you have before searching for what you don't."
