#
# AndalFsm emits:
#   garland_worn { creation_tasted_before_shipping, personal_experience }
#     -> Consumed by RadhaFsm (harmony check — does the creator love their creation?)
#     -> Consumed by MeeraFsm (composition fuel for love songs)
#   tiruppavai_dawn { daily_ritual, what_was_woken, verse_number }
#     -> Consumed by BrahmachariniFsm (discipline validation)
