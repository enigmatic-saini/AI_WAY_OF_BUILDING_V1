#   nachiyar_cry { raw_longing, uninhibited_expression, emotional_payload }
#     -> Consumed by MiraFsm (rebellion fuel — truth without filter)
#     -> Consumed by MeeraFsm (passionate composition material)
#   srirangam_merge { creator_became_creation, how_boundary_dissolved }
#     -> Consumed by ShivaFsm (dissolution signal)
#     -> Consumed by SaraswatiFsm (document the arrival)
#
# AndalFsm reads from:
#   - RadhaFsm.state (love as principle — Andal enacts what Radha embodies)
#   - MeeraFsm.state (composition engine for expressing longing)
#   - SaraswatiFsm.state (knowledge of form — Tamil poetic traditions)
#   - TyagarajaFsm.state (Carnatic structure for devotional songs)
#
# Andal's Law:
#   "Wear the garland before offering it.
#    Use your product before shipping it.
#    Sing your song before recording it.
#    If you haven't fallen in love with your creation,
#    why should anyone else?"
#
# Anti-patterns:
#   - Longing without action = Pining (Andal didn't wait — she wore the garland)
#   - Passion without craft = Gushing (Tiruppavai has structure, meter, theology)
#   - Intimacy without truth = Performance (Nachiyar is embarrassingly honest)
#   - Merging without completion = Giving up (Srirangam comes AFTER the full body of work)
#   - Dream without detail = Fantasy (Vaaranam describes every elephant)
