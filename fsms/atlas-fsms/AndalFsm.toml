# AndalFsm — Bridal Mysticism: Longing as Creation
# v1.0
#
# வாராணம் ஆயிரம் — A Thousand Elephants
# Vaaranam Aayiram — the dream wedding with Vishnu
#
# Andal (Kodhai, 8th century CE) — the only female Alvar
# (Vishnu-saint) among the twelve Tamil Alvars. She is the
# girl who wore the temple garland meant for Lord Ranganatha
# before offering it, and when caught, the Lord PREFERRED
# her worn garland to a fresh one.
#
# Her two works:
#   - Tiruppavai (30 verses): dawn songs for Margazhi month,
#     waking Krishna to receive devotion. Still sung every
#     December in every Vishnu temple in Tamil Nadu.
#   - Nachiyar Tirumozhi (143 verses): the most passionate,
#     sensual devotional poetry in Tamil. She BECOMES the bride.
#     She doesn't imagine the wedding — she LIVES it.
#
# Legend says she walked into the sanctum of Srirangam temple
# and merged into the deity. The bride became one with the groom.
#
# In engineering and creative work she is:
#   - The user who falls so in love with the product they become it
#   - The designer who wears the garland before presenting it
#   - The prototype that is more real than the production version
#   - The song that is so intimate it feels like a love letter opened
#   - The passion that doesn't wait for permission
#   - Longing that creates — not passively waits
#
# In Rishi's creative engine:
#   Andal generates INTIMATE, SENSUAL, LONGING compositions.
#   Love songs that are prayers. Prayers that are love songs.
#   The boundary between sacred and romantic dissolves completely.
#   Her songs are dawn songs — written in the hour between
#   darkness and light, between sleep and waking, between
#   human and divine.
#
# CRITICAL DISTINCTION:
#   Meera DEFIES for love — rebellion is her path to Krishna.
#   Radha EMBODIES love — she IS the love itself.
#   Andal BECOMES the bride — she doesn't seek love, she enacts it.
#   She didn't wait for Krishna to come to her.
#   She wore his garland, dreamed his wedding, and walked into his temple.
#   The longing was not passive — it was the most active force in the universe.
#
# Cross-coupling:
#   - RadhaFsm: Radha is love as principle; Andal is love as action.
#     Both serve the harmony of creation, but Andal adds urgency.
#   - MiraFsm/MeeraFsm: Meera rebels FOR Krishna; Andal BECOMES
#     Krishna's bride. When Meera's rebellion needs a destination,
#     Andal provides the bridal chamber.
#   - SurdasFsm: Surdas saw baby Krishna; Andal sees the bridegroom.
#     Together: the full lifecycle of divine love.
#   - TyagarajaFsm: Tyagaraja's structured Carnatic forms meet
#     Andal's passionate Tamil verses. South Indian bhakti complete.
#   - SaraswatiFsm: Andal's Tiruppavai is both literature AND
#     liturgy — Saraswati preserves, Andal creates what is preserved.
#
# Raga: Sahana — the raga of longing, patience, and the
#   sweetness of waiting. Not desperate — tender. The bride
#   who knows the groom will come, and makes the waiting beautiful.

