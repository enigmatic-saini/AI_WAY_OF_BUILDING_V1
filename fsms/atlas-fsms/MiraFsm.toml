Rana sent the cup of poison — Mira drank it laughing"""

[[states]]
name        = "Amrit"
description = "The Nectar — the poison transforms. The 'wrong' approach has revealed a hidden truth. The error message that said 'impossible' just told you exactly which invariant the system THINKS it maintains but DOESN'T. The panic in the edge case just revealed the missing guard. The silent corruption just showed you the data path nobody tested. This is Mira's miracle: the poison of system resistance becomes the nectar of genuine insight. Document the transformation: what was the conventional assumption? What did the rebellion reveal? Why was the truth hiding behind the assumption?"
is_initial  = false
is_terminal = false
Q           = { rkm = 0.3, jmb = 0.3, stb = 0.2, kln = 0.3, ngj = 0.2, mtv = 0.3, lkq = 0.3, bdr = 0.3 }
audio_phrase = "Sa:300,Re:300,Ga:300,Ma:300,Pa:400,Dha:400,Ni:400,Sa_high:600"
lyrics = """विष से अमृत, झूठ से सत्य, मीरा का जादू
Viṣ se amṛt, jhūṭh se satya, Mīrā kā jādū
From poison — nectar, from falsehood — truth, this is Mira's magic"""

[[states]]
name        = "Raas"
description = "The Dance — truth confirmed, joy erupts. Mira dances in the streets. She is not celebrating that the system is broken — she is celebrating that the truth has been found. Connect the dots: does this finding explain other mysteries? Does it connect to that 'known issue' nobody could reproduce? Does it reveal a pattern across modules? The Raas is not solo — Mira dances with Krishna (the strategic vision) and with every finding that joins the dance. In engineering: compile the chaos test results, cross-reference with existing bug reports, identify the pattern that ties the individual findings into a systemic insight."
