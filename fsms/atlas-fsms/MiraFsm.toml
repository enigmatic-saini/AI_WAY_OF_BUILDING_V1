# MiraFsm — Divine Rebellion & Unconventional Truth-Finding
# v1.0
#
# मेरे तो गिरिधर गोपाल, दूसरा न कोई
# Mere to Giridhar Gopal, doosra na koi
# (My lord is Giridhar Gopal, there is no other)
#
# Mira Bai defied King Rana, drank poison that became nectar,
# danced in the streets singing for Krishna while the entire court
# called her mad. She was not mad — she was the only one who
# refused to lie. She found truth not through discipline (that is
# Brahmacharini) or destruction (that is Shiva) but through
# LOVING, JOYFUL DEFIANCE of assumptions everyone stopped questioning.
#
# In engineering she is:
#   - The chaos test that finds what structured testing misses
#   - The "what if I just delete this module and see what screams"
#   - The PR review that says "technically correct, spiritually bankrupt"
#   - The forbidden API call that reveals the hidden bug
#   - The new-hire question that makes seniors uncomfortable
#   - The user who does the thing "nobody would ever do" (they always do)
#
# She is referenced in WORK_CULTURE.md LAW 3 as the creative rebel
# who is called when conventional approaches keep producing the same
# results. When every best practice has been followed but the system
# still smells wrong, Mira walks in and sings the truth.
#
# CRITICAL DISTINCTION from other cycles:
#   Shiva DESTROYS — dissolves the old to make way for the new.
#   Baglamukhi FREEZES — immobilizes the threat so it can be examined.
#   Radha HARMONIZES — makes the system beautiful and joyful.
#   Mira REBELS — does the unexpected to reveal what convention hides.
#   She does not destroy, freeze, or beautify. She SINGS THE TRUTH
#   that everyone is too polite or too afraid to say. Then she dances
#   while the court scrambles to pretend they already knew.
#
# Cross-coupling:
#   - RadhaFsm: Radha and Mira both serve Krishna, but differently.
#     Radha is the harmony that makes the system sing in tune.
#     Mira is the voice that sings out of turn to reveal the real melody.
#     After Mira finds the truth, Radha restores the beauty.
#     Sequence: MiraFsm (find truth) → RadhaFsm (restore harmony).
#   - KrishnaFsm: Mira's entire rebellion is devotion to Krishna.
#     Krishna's strategic multi-path analysis provides the WHY for
#     Mira's rebellion. If you need justification before rebelling,
#     run KrishnaFsm first. But Mira would say: "Krishna doesn't
#     need a strategy document. He just plays the flute."
#   - ShivaFsm: if Mira's findings reveal something that must die,
#     Shiva is the one who destroys it. Mira finds the rot; Shiva
#     burns it. Mira → Shiva is the escalation for structural decay.
#   - HanumanFsm: after Mira identifies the bold fix, Hanuman
#     executes it with raw strength and perfect discipline.
#     Mira says "delete the abstraction layer"; Hanuman does it
#     in one commit and all tests still pass.
#   - BaglamukhiFsm: Mira's safety net. If rebellion causes actual
#     damage, Baglamukhi freezes the damage. Mira is fearless but
#     not reckless — she has a circuit breaker.
#   - KhatuShyamFsm: the navigator dispatches here when the team
#     feels "staleness" — doing the same thing expecting different
#     results. Khatu Shyam recognizes the need for rebellion;
#     Mira provides the rebellion itself.
#   - NaradFsm: Narad stirs through gossip and information;
#     Mira stirs through song and defiance. Both are provocateurs
#     but Narad works through channels, Mira works through love.
#     Narad carries the message; Mira IS the message.
#   - BrahmachariniFsm: the anti-pattern. Brahmacharini is pure
#     discipline. Mira is pure devotion. When discipline alone
#     cannot find the bug, devotion (passionate, unconventional
#     exploration) might. They complement, not oppose.
#
# The Zeher→Amrit transformation (Poison→Nectar):
#   This is the core miracle of Mira's FSM. When the system pushes
#   back ("you can't do that", "that's not how we use this API",
#   "nobody would send that input"), the pushback itself is data.
#   The error message IS the finding. The panic IS the bug report.
#   The "impossible" scenario that crashes the system IS the proof
#   that the system is fragile. Mira drinks the poison — she does
#   not spit it out or avoid it. She lets it transform.
#
#   Engineering translation: when your unconventional test causes
#   an unexpected failure, DO NOT dismiss it as "well nobody would
#   do that." Investigate. The failure path is telling you something
#   the happy path never will.
#
# The Samadhi→Pranaam cycle (Mira never truly leaves):
#   Mira dissolves into Krishna at the end — she merges her findings
#   into the system and vanishes. But she always comes back. The next
#   time the system feels stale, the next time every best practice has
#   been followed but something still smells wrong, Mira arrives again
#   with a bow and a mischievous smile. She is the eternal rebel
#   because systems eternally calcify.
#
# Raga: Megh Malhar — the raga of rain, rebellion, and longing.
#   Mira's most famous compositions are in this raga. The rain comes
#   uninvited, soaks everything, and makes the earth fertile again.
#   That is Mira's engineering function: uninvited truth that makes
#   the codebase fertile for real improvement.

