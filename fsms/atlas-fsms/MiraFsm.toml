# ── Transitions ──────────────────────────────────────────────

# Pranaam → Madhushala: the bow is done, now the singing begins.
# Triggered when a conventional review feels incomplete — all checks
# pass but intuition says something is hidden.
[[transitions]]
from   = "Pranaam"
to     = "Madhushala"
event  = "conventional_review_unsatisfying"
guard  = "all_checks_pass_but_smell_remains"
action = "log_entry_reason; inventory_conventions; mark_sacred_cows; begin_unconventional_exploration"
drishti = ["present", "down"]

# Pranaam → Raas: FAST PATH — Mira already knows the truth.
# Sometimes the rebel arrives and the finding is immediately obvious.
# The sacred cow is standing in the middle of the room. No need for
# the full rebellion — just point and dance.
[[transitions]]
from   = "Pranaam"
to     = "Raas"
event  = "obvious_truth_visible"
guard  = "finding_is_self_evident"
action = "document_obvious_finding; skip_to_celebration; log_fast_path"
drishti = ["present", "down"]

# Madhushala → Zeher: the first unconventional action causes pushback.
# The system says "you can't do that." The team says "nobody would
# do that." The docs say "undefined behavior." Good. Now we're learning.
[[transitions]]
from   = "Madhushala"
to     = "Zeher"
event  = "system_pushback"
guard  = "unconventional_action_rejected"
action = "capture_error_response; record_pushback_reason; note_which_assumption_was_violated; log_poison_offered"
drishti = ["present", "silence"]

# Madhushala → Madhushala: SELF-LOOP — keep singing, keep probing.
# Not every unconventional action produces pushback. Some just... work.
# That's data too (the system is more flexible than claimed). Keep
# trying different rebellions until something interesting happens.
[[transitions]]
from   = "Madhushala"
to     = "Madhushala"
event  = "no_pushback_yet"
guard  = "more_unconventional_actions_to_try"
action = "try_next_rebellion; record_what_surprisingly_worked; log_iteration"
drishti = ["present", "down"]

# Madhushala → Viraha: nothing breaks, nothing pushes back.
# The system is genuinely robust or Mira's rebellion was too timid.
# Step back and reconsider from a distance. Maybe the problem isn't
# a hidden bug — maybe it's a structural assumption at a higher level.
[[transitions]]
from   = "Madhushala"
to     = "Viraha"
event  = "rebellion_found_nothing"
guard  = "all_unconventional_actions_exhausted"
action = "record_negative_finding; note_system_resilience; shift_to_structural_perspective; log_escalation_to_viraha"
drishti = ["present", "down"]

# Zeher → Amrit: the poison transforms — the pushback reveals truth.
# The error message IS the finding. The panic IS the bug report. The
# "impossible" scenario that just happened IS the proof of fragility.
# This is the miracle transition. Document the transformation.
[[transitions]]
from   = "Zeher"
to     = "Amrit"
event  = "truth_revealed_through_resistance"
guard  = "pushback_contains_genuine_insight"
action = "document_transformation; record_assumption_violated; capture_hidden_invariant; log_poison_to_nectar"
drishti = ["present", "down"]

# Zeher → Zeher: SELF-LOOP — more poison, more data.
# Multiple pushbacks from different angles. Each error message, each
# panic, each "you can't do that" is another data point. Keep drinking.
# Mira didn't stop at one cup.
[[transitions]]
from   = "Zeher"
to     = "Zeher"
event  = "more_resistance_encountered"
guard  = "additional_pushback_informative"
action = "drink_more_poison; record_additional_error_data; cross_reference_failures; log_additional_zeher"
drishti = ["present", "down"]

# Zeher → Viraha: SAFETY EXIT — the poison is real.
# The unconventional action risks actual damage (prod data, live users,
# irreversible state change). Mira was fearless but not reckless — she
# had divine protection. You have rollback plans. Skip to distance
# perspective immediately. Do not proceed through Amrit/Raas.
[[transitions]]
from   = "Zeher"
to     = "Viraha"
event  = "actual_damage_risk"
guard  = "production_safety_threatened"
action = "abort_rebellion; document_risk_finding; flag_safety_gap; invoke_baglamukhi_if_needed; log_safety_exit"
drishti = ["present", "down"]

# Zeher → Pranaam: FULL RESET — rebellion caused actual damage.
# Something broke that shouldn't have. Bow out. Reset. This is not
# failure — it's data (the system lacks proper guardrails). But first,
# undo the damage.
[[transitions]]
from   = "Zeher"
to     = "Pranaam"
event  = "damage_caused"
guard  = "must_undo_and_reset"
action = "undo_damage; document_guardrail_gap; file_safety_finding; reset_state; log_humble_retreat"
drishti = ["present", "past"]

# Amrit → Raas: truth confirmed, time to dance and connect dots.
# The nectar is real — the finding is genuine. Now celebrate by
# cross-referencing with existing bugs, known issues, and patterns
# across modules.
[[transitions]]
from   = "Amrit"
to     = "Raas"
event  = "finding_confirmed"
guard  = "root_cause_identified"
action = "begin_dot_connection; cross_reference_bug_reports; identify_systemic_pattern; log_raas_entry"
drishti = ["present", "down"]

# Amrit → Madhushala: nectar found, but there might be more.
# One truth revealed, but the rebellion energy is still high. Go back
# and sing more — test more unconventional paths while the creative
# chaos is flowing. Mira didn't sing one bhajan and stop.
[[transitions]]
from   = "Amrit"
to     = "Madhushala"
event  = "more_to_explore"
guard  = "rebellion_energy_remaining"
action = "record_finding; return_to_exploration; log_continued_rebellion"
drishti = ["present", "down"]

# Raas → Viraha: enough dancing, time for perspective.
# The dots are connected. The findings are compiled. Step back from
# the dance to see the whole picture — from individual bugs to
# structural understanding.
[[transitions]]
from   = "Raas"
to     = "Viraha"
event  = "sufficient_evidence_gathered"
guard  = "pattern_complete"
action = "compile_song_list; step_back_for_perspective; log_viraha_entry"
drishti = ["present", "up"]

# Raas → Raas: SELF-LOOP — the dance grows as more connections appear.
# Each finding that joins the dance reveals new connections. The Raas
# grows richer. Krishna's flute plays louder as the pattern deepens.
[[transitions]]
from   = "Raas"
to     = "Raas"
event  = "new_connection_discovered"
guard  = "additional_dots_to_connect"
action = "add_finding_to_dance; update_systemic_pattern; log_raas_expansion"
drishti = ["present", "down"]

# Viraha → Samadhi: the full picture is seen, time to dissolve.
# Mira has seen the truth from a distance. The verdict is clear.
# Write the Song List, the Nectar Prescriptions, the Love Letter.
# Deliver the Mira Verdict. Then vanish.
[[transitions]]
from   = "Viraha"
to     = "Samadhi"
event  = "full_picture_seen"
guard  = "verdict_ready"
action = "write_song_list; write_nectar_prescriptions; write_love_letter; deliver_mira_verdict; log_samadhi"
drishti = ["present", "down"]

# Viraha → Madhushala: distance reveals a new angle to probe.
# Stepping back made Mira see something she missed while dancing.
# Return to the tavern for another round of unconventional testing.
[[transitions]]
from   = "Viraha"
to     = "Madhushala"
event  = "new_angle_spotted_from_distance"
guard  = "unexplored_dimension_identified"
action = "record_new_hypothesis; return_to_exploration; log_return_to_madhushala"
drishti = ["present", "down"]

# Samadhi → Pranaam: Mira returns for the next rebellion.
# Systems eternally calcify. Conventions accumulate. Sacred cows breed.
# Mira always comes back — with a bow and a mischievous smile.
[[transitions]]
from   = "Samadhi"
to     = "Pranaam"
event  = "system_calcified_again"
guard  = "staleness_detected"
action = "reset_rebellion_state; arrive_with_fresh_eyes; log_mira_returns"
drishti = ["present", "down"]

# ── Emergency transitions ────────────────────────────────────

# ANY → Pranaam: if rebellion causes actual damage anywhere in the
# cycle, bow out and reset. Mira defied kings, not physics. She had
# divine protection; you have rollback plans and BaglamukhiFsm.
# This is the universal safety valve.

# ── Cross-coupling signals ───────────────────────────────────
#
# MiraFsm emits:
#   sacred_cow_identified { convention, reason_it_persists, evidence }
#     → Consumed by KrishnaFsm (strategic assessment of whether to
#       keep or slaughter the sacred cow)
#   poison_to_nectar { unconventional_action, pushback_received,
#     truth_revealed, assumption_violated }
#     → Consumed by ShivaFsm (if destruction needed), RadhaFsm
#       (if beauty restoration needed), HanumanFsm (if bold execution needed)
#   mira_verdict { song_list, nectar_prescriptions, love_letter,
#     system_pretends_to_be, system_actually_is, what_mira_would_delete,
#     single_change_to_make_it_sing }
#     → Consumed by KhatuShyamFsm (cycle audit), ThoughtCycleFsm
#       (learning), KrishnaFsm (strategic planning)
#   safety_exit { risk_type, action_attempted, damage_potential }
#     → Consumed by BaglamukhiFsm (freeze if needed),
#       LakshmanFsm (sentinel alert)
#
# MiraFsm reads from:
#   - KhatuShyamFsm.dispatch (when navigator routes "staleness" here)
#   - KrishnaFsm.state (strategic context for the rebellion)
#   - RadhaFsm.state (current harmony level — how much beauty exists
#     to protect during rebellion)
#   - BaglamukhiFsm.state (safety net status — are circuit breakers
#     in place before we start breaking things?)
#   - NaradFsm.state (communication channels — where is information
#     being lost or distorted?)
#
# Mira's Law:
#   "Every system has a truth it is hiding from itself.
#    Structured testing finds the bugs the system knows about.
#    Mira finds the bugs the system is pretending don't exist."
#
# Anti-patterns (what Mira is NOT):
#   - Rebellion without love = Vandalism (bad code review, not Mira)
#   - Breaking things to prove a point = Ego (not devotion)
#   - Ignoring safety = Recklessness (Mira had Krishna; you have rollbacks)
#   - Criticizing without alternatives = Gossip (that's Narad's shadow)
#   - Defying rules you haven't understood = Ignorance (Mira knew every
#     scripture — she defied from ABOVE, not from below)
