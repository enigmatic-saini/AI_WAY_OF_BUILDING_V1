# -- States -------------------------------------------------------

[[states]]
name        = "Taleem"
description = "The Training — Tansen under Haridas in Vrindavan, and under Muhammad Ghaus in Gwalior. Two traditions, two disciplines, one student who synthesized both. In creative work: the apprenticeship phase. Learn the rules before breaking them. Know every raga before creating a new one. Tansen spent decades in taleem before entering the court. There are no shortcuts to mastery."
is_initial  = true
is_terminal = false
audio_phrase = "Sa:400,Re_komal:500,Ga:400,Ma_tivra:500,Pa:400,Dha_komal:500,Ni:400,Sa_high:500"
Q           = { rkm = 0.2, jmb = 0.3, stb = 0.2, kln = 0.4, ngj = 0.1, mtv = 0.3, lkq = 0.3, bdr = 0.2 }
# Q rationale: Training — Kalindi (patience) moderate: decades of riyaaz. Jambavati (endurance)
# moderate: apprenticeship is endurance. Lakshmana (precision) emerging through practice.
lyrics = """तालीम लो, रियाज़ करो — उस्ताद की मेहनत ही जादू है
Tālīm lo, riyāz karo — ustād kī mehnat hī jādū hai
Take training, practice — the master's labor is the real magic"""

[[states]]
name        = "Darbar"
description = "The Court — Tansen enters Akbar's court as a Navaratna. His music now serves a purpose beyond devotion: it governs, it heals, it demonstrates power. In creative work: the song enters the market. It must work for an audience. It must communicate, not just express. The transition from grove to court, from practice to performance, from private to public. Not every Nidhivan song survives the Darbar. Only the ones with both purity and power."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Re_komal:300,Ga:400,Ma_tivra:300,Pa:400,Dha_komal:300,Ni:400,Sa_high:500,Ni:300,Dha_komal:400"
Q           = { rkm = 0.4, jmb = 0.4, stb = 0.4, kln = 0.2, ngj = 0.4, mtv = 0.5, lkq = 0.5, bdr = 0.4 }
# Q rationale: The court — all dims moderate: power must work across all dimensions.
# Lakshmana (precision) rising: performance demands exactness.
lyrics = """दरबार में प्रवेश — अब संगीत राज करेगा
Darbār meṁ praveś — ab saṅgīt rāj karegā
Entering the court — now music shall reign"""

[[states]]
name        = "Deepak"
description = "The Lamp Raga — Tansen sings Raga Deepak. Lamps ignite. The air heats. His body begins to burn. This is the state of maximum creative power: the song is so powerful it transforms reality. But it is also consuming the creator. In creative work: the magnum opus that drains you. The feature so ambitious it risks burning out the team. The performance that changes everything but costs everything. Deepak is the warning: unlimited power without balance will kill you."
is_initial  = false
is_terminal = false
audio_phrase = "Ma_tivra:400,Pa:300,Dha:400,Ni:500,Sa_high:600,Ni:400,Dha:400,Ma_tivra:500,Pa:600"
Q           = { rkm = 0.5, jmb = 0.5, stb = 0.8, kln = 0.0, ngj = 0.9, mtv = 0.6, lkq = 0.7, bdr = 0.3 }
# Q rationale: The lamp raga — Nagnajiti (impossible spec) near-peak: lighting lamps with music.
# Satyabhama (fierce pride) high: maximum power unleashed. Kalindi zero: fire, not patience.
lyrics = """दीपक जले, तन जले — शक्ति बिन संयम विष है
Dīpak jale, tan jale — śakti bin saṁyam viṣ hai
The lamp burns, the body burns — power without restraint is poison"""

[[states]]
name        = "Megh_Malhar"
description = "The Rain Raga — the antidote. When Deepak's fire is consuming, Megh Malhar brings the rain. In the legend, Tani (Haridas's student/daughter) sang Megh Malhar to save Tansen from Deepak's fire. In creative work: the balancing force. The refactoring after the ambitious feature. The rest after the sprint. The simplicity that cools the complexity. Every Deepak MUST have a Megh Malhar waiting. Ship the fire; then ship the rain."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:400,Re:300,Ma:400,Pa:500,Ni:400,Sa_high:500,Ni:400,Pa:400,Ma:500,Re:400,Sa:600"
Q           = { rkm = 0.5, jmb = 0.6, stb = 0.2, kln = 0.6, ngj = 0.3, mtv = 0.5, lkq = 0.4, bdr = 0.5 }
# Q rationale: The rain raga — Kalindi (patience) rising: cooling requires stillness.
# Jambavati (endurance) moderate: recovery takes stamina. Satyabhama drops: pride cools.
lyrics = """मेघ मल्हार गाओ, बारिश बुलाओ — आग बुझे, प्राण बचे
Megh Malhār gāo, bāriś bulāo — āg bujhe, prāṇ bace
Sing Megh Malhar, summon rain — the fire dies, life is saved"""

[[states]]
name        = "Navaratna"
description = "The Nine Jewels — Tansen as one of Akbar's nine jewels. The master recognized at the highest level. In creative work: the song that enters the canon. The composition that defines a genre. The code that becomes the standard. But Navaratna is not the end — it is the responsibility. Tansen didn't stop composing after recognition. He created Mian ki Todi, Mian ki Malhar, Mian ki Sarang — new ragas that would outlive the empire."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Ga:400,Pa:500,Sa_high:600,Pa:400,Ga:400,Sa:500,Re_komal:400,Ga:500,Ma_tivra:600"
Q           = { rkm = 0.6, jmb = 0.6, stb = 0.6, kln = 0.3, ngj = 0.6, mtv = 0.7, lkq = 0.7, bdr = 0.6 }
# Q rationale: Nine jewels — all dims elevated and balanced: mastery recognized.
# Lakshmana (precision) high: consistent excellence. Mitravinda high: creating within tradition.
lyrics = """नवरत्न — पर रत्न बनना अंत नहीं, आरम्भ है
Navaratna — par ratna bannā ant nahīṁ, ārambh hai
A jewel among nine — but becoming a jewel is the beginning, not the end"""

[[states]]
name        = "Naya_Raga"
description = "The New Raga — Tansen's greatest legacy: he created new ragas. Mian ki Todi, Mian ki Malhar, Mian ki Sarang, Darbari Kanada. Not just performing within tradition — EXPANDING tradition. In creative work: the new genre, the new form, the new pattern that didn't exist before. This is the highest creative state: not just mastering what exists but creating what will exist for centuries. Tansen didn't just play ragas. He gave the world new ones."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:300,Re_komal:400,Ga:500,Ma_tivra:600,Pa:500,Dha_komal:600,Ni:700,Sa_high:800"
Q           = { rkm = 0.7, jmb = 0.7, stb = 0.7, kln = 0.4, ngj = 0.8, mtv = 0.8, lkq = 0.8, bdr = 0.6 }
# Q rationale: Terminal — Nagnajiti near-peak: creating NEW ragas is the impossible made real.
# Lakshmana high: new raga grammar must be perfect. Mitravinda high: expanding tradition IS authentic choice.
lyrics = """नया राग रचो — जो सदियों तक गूँजे
Nayā rāg raco — jo sadiyoṁ tak gūñje
Create a new raga — one that echoes for centuries"""

