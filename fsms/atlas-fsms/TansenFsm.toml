# -- Cross-coupling signals ----------------------------------------
#
# TansenFsm emits:
#   deepak_lit { composition, power_level, burn_risk }
#     -> Consumed by HaridasFsm (guru checks if purity holds)
#     -> Consumed by ShivaFsm (fire energy for transformation)
#   megh_malhar_needed { burn_severity, balance_type_needed }
#     -> Consumed by RadhaFsm (harmony restoration)
#     -> Consumed by BaglamukhiFsm (emergency cooling)
#   naya_raga { new_form, tradition_it_extends, innovation_type }
#     -> Consumed by SaraswatiFsm (document new knowledge)
#     -> Consumed by NaradFsm (transmit to the world)
#     -> Consumed by MeeraFsm (new raga available for composition)
#
# TansenFsm reads from:
#   - HaridasFsm.state (guru's purity level — is the foundation solid?)
#   - NaradFsm.state (harmonic theory — what maps are available?)
#   - MeeraFsm.state (compositional fire — what emotional fuel exists?)
#   - ShivaFsm.state (destruction energy — is Deepak safe to invoke?)
#
# Tansen's Law:
#   "Every Deepak must have a Megh Malhar.
#    Every fire must have a rain.
#    Every ambitious creation must have a recovery plan.
#    The master who lights lamps without knowing how to bring rain
#    will burn in his own brilliance."
#
# Anti-patterns (what Tansen is NOT):
#   - Power for power's sake = Ego (Tansen served music, not himself)
#   - Performance without training = Fraud (decades of riyaaz first)
#   - Innovation without tradition = Rootlessness (new ragas EXTEND tradition)
#   - Court music without devotion = Prostitution (Tansen secretly sang for Krishna)
#   - Burning without recovery = Suicide (always have Megh Malhar ready)
