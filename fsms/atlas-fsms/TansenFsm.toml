# TansenFsm — Raga Mastery: Music as Transformative Power
# v1.0
#
# रागों का जादूगर — जिसके दीपक राग से दीप जले,
# मेघ मल्हार से बादल बरसे
# Rāgoṁ kā jādūgar — jiske Deepak rāg se dīp jale,
# Megh Malhār se bādal barse
# (The sorcerer of ragas — whose Deepak lit lamps,
# whose Megh Malhar brought rain)
#
# Tansen (Ramtanu Pandey) — one of the nine jewels (Navaratna)
# of Emperor Akbar's court. Student of Swami Haridas and
# Muhammad Ghaus. The greatest musician in recorded Indian history.
#
# His powers were legendary:
#   - Raga Deepak: lit oil lamps with music, but burned his own body
#   - Raga Megh Malhar: brought rain to cool the fire
#   - Raga Mian ki Todi: created new ragas that survive 500 years later
#   - His singing could make animals listen, stones weep
#
# But the critical lesson: when Deepak's fire burned him,
# only his guru Haridas's daughter (or wife, depending on the legend)
# Tani and Tansen's own student sang Megh Malhar to save him.
# POWER WITHOUT WISDOM DESTROYS THE WIELDER.
#
# In engineering and creative work he is:
#   - The 10x engineer who can bend the system to their will
#   - The song that changes the mood of an entire room
#   - The technical solution so elegant it feels like magic
#   - The performance optimization that makes impossible possible
#   - BUT ALSO: the brilliance that burns out without balance
#
# In Rishi's creative engine:
#   Tansen generates POWERFUL, TECHNICALLY BRILLIANT compositions.
#   Raga-driven, precise, capable of evoking specific emotions
#   and transforming the listener's state. But every Tansen
#   composition must pass through Haridas's purity check —
#   power without purity is Deepak without Megh Malhar.
#
# CRITICAL DISTINCTION:
#   Haridas SURRENDERS — music flows through him, audience-free.
#   Tansen COMMANDS — music is wielded with precision and intent.
#   Meera DEFIES — music is rebellion against convention.
#   Tansen is the bridge: trained by Haridas (purity), serving
#   Akbar (worldly power), creating ragas that outlive both.
#
# Cross-coupling:
#   - HaridasFsm: guru-shishya. Tansen's power without Haridas's
#     purity leads to Deepak's fire. Always check purity after power.
#   - MeeraFsm: Meera and Tansen were contemporaries. Meera
#     sang for Krishna; Tansen sang for Akbar (and secretly
#     for Krishna too). When Rishi needs passion + power,
#     channel Meera's fire through Tansen's precision.
#   - NaradFsm: Narad's harmonic maps provide the theoretical
#     foundation. Tansen applies theory as living music.
#   - SaraswatiFsm: Saraswati provides knowledge; Tansen
#     demonstrates what happens when knowledge becomes mastery.
#   - ShivaFsm: Raga Deepak is Shiva's fire — creative destruction.
#     When Tansen invokes Deepak, Shiva's energy flows through.
#     Always have Megh Malhar (cooling) ready before lighting Deepak.
#
# Raga: Mian ki Todi — Tansen's own creation. Morning raga of
#   intense, focused energy. Komal Re, Komal Dha give it gravity.
#   Tivra Ma gives it an edge. It is the raga of the master
#   craftsman at dawn — disciplined fire.

