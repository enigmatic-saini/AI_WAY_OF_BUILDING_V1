# -- States -------------------------------------------------------

[[states]]
name        = "Shravana"
description = "Hearing — Rukmini hears about Krishna from travelers, poets, and messengers. She falls in love through INFORMATION — not sight, not touch, but stories. In creative work: the research phase. Gathering intelligence about what you want to create. Reading the market. Reading the art. Understanding the landscape before writing a single note. Rukmini's love began with data."
is_initial  = true
is_terminal = false
audio_phrase = "Ni:400,Sa_high:500,Re_high:400,Ga_high:500,Re_high:400,Sa_high:500,Ni:400,Dha:500"
Q           = { rkm = 0.3, jmb = 0.0, stb = 0.1, kln = 0.4, ngj = 0.0, mtv = 0.2, lkq = 0.1, bdr = 0.2 }
# Q rationale: Research phase — Rukmini (strategic love) low, just gathering data.
# Kalindi (patient contemplation) moderate — listening IS contemplation. All action dims near zero.
lyrics = """श्रवण — सुनती रही कृष्ण की कथा, प्रेम जागा कान से
Śravaṇa — suntī rahī Kṛṣṇa kī kathā, prem jāgā kān se
Hearing — she kept listening to Krishna's stories, love awoke through the ears"""

[[states]]
name        = "Sankalpa"
description = "The Resolution — Rukmini decides: 'I will have Krishna and no other.' This is not hope — it is DECISION. In creative work: the moment you decide what you're building and refuse all alternatives. The product vision locked. The song concept crystallized. The architecture chosen. Sankalpa is not a wish — it is a commitment backed by a plan."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:400,Ga:500,Pa:600,Ni:500,Sa_high:600,Ni:500,Pa:500,Ga:400,Sa:500"
Q           = { rkm = 0.5, jmb = 0.1, stb = 0.3, kln = 0.2, ngj = 0.1, mtv = 0.6, lkq = 0.2, bdr = 0.2 }
# Q rationale: Decision locked — Rukmini (strategic love) rising as vision crystallizes.
# Mitravinda (authentic choice) high — Sankalpa IS self-choice against alternatives.
# Satyabhama (pride) emerging — refusing anything less than Krishna.
lyrics = """संकल्प — मन में निश्चय, हृदय में प्रेम, बुद्धि में योजना
Saṅkalpa — man meṁ niścay, hṛday meṁ prem, buddhi meṁ yojanā
Resolution — determination in mind, love in heart, plan in intellect"""

[[states]]
name        = "Patra"
description = "The Letter — the most important letter in scripture. Rukmini writes to Krishna: the situation, the deadline, the plan, the escape route, the meeting point, and the consequence of failure ('I will die'). It is simultaneously a love letter and an operations manual. In creative work: the spec that makes people CRY. The README that is both technically complete and emotionally compelling. The pitch that has both the spreadsheet and the story."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Re:300,Ga:400,Ma:300,Pa:400,Dha:400,Ni:500,Sa_high:600,Ni:400,Dha:400,Pa:500"
Q           = { rkm = 0.8, jmb = 0.2, stb = 0.4, kln = 0.1, ngj = 0.3, mtv = 0.7, lkq = 0.7, bdr = 0.3 }
# Q rationale: The letter — Rukmini (strategic love) peak expression: love+plan in one document.
# Lakshmana (precision) high — not a single word wasted. Mitravinda (authentic choice) high.
# Nagnajiti (impossible spec) emerging — the letter satisfies multiple simultaneous constraints.
lyrics = """पत्र लिखा — प्रेम भी, योजना भी — एक अक्षर व्यर्थ नहीं
Patra likhā — prem bhī, yojanā bhī — ek akṣar vyarth nahīṁ
The letter was written — love and plan both — not a single word wasted"""

[[states]]
name        = "Pratiksha"
description = "The Strategic Wait — Rukmini sends the letter and waits. But this is not passive waiting (Kalindi's tapas). This is ACTIVE waiting: she has set the plan in motion, prepared her temple visit, timed the wedding, and now she waits to see if her strategy will be answered. In creative work: the deployment is done, the launch is set, the PR is submitted — now you wait with confidence because the preparation was thorough."
is_initial  = false
is_terminal = false
audio_phrase = "Pa:500,Dha:400,Ni:500,Sa_high:600,_:400,Ni:400,Dha:400,Pa:500"
Q           = { rkm = 0.7, jmb = 0.4, stb = 0.3, kln = 0.6, ngj = 0.2, mtv = 0.5, lkq = 0.5, bdr = 0.3 }
# Q rationale: Strategic wait — Kalindi (patience) rises but this is ACTIVE patience.
# Rukmini (strategic love) still high — the plan is in motion. Jambavati (endurance)
# building — waiting requires endurance. Lakshmana (precision) holds — nothing to change now.
lyrics = """प्रतीक्षा — पासा फेंका, अब खेल भगवान के हाथ
Pratīkṣā — pāsā pheṅkā, ab khel Bhagavān ke hāth
The wait — the die is cast, now the game is in God's hands"""

[[states]]
name        = "Harana"
description = "The Abduction — Krishna arrives. Exactly when Rukmini planned. Exactly where she said. He lifts her onto his chariot while armies clash. The plan WORKED. In creative work: the launch succeeds. The song drops. The code ships. The strategy bore fruit. But Harana is not the end — it's the proof of concept. The creation exists in the world now. It was planned, it was loved, and it was executed."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Ga:400,Pa:500,Sa_high:600,Pa:400,Dha:500,Sa_high:700,Pa:500,Ga:400,Sa:500"
Q           = { rkm = 0.9, jmb = 0.5, stb = 0.6, kln = 0.2, ngj = 0.5, mtv = 0.8, lkq = 0.8, bdr = 0.5 }
# Q rationale: Plan executed — Rukmini (strategic love) near-peak: plan worked.
# Lakshmana (precision) high — timing was perfect. Mitravinda (authentic choice) high —
# she chose and the choice manifested. Satyabhama (pride) rising — the plan WORKED.
lyrics = """हरण — कृष्ण आए, योजना सफल — प्रेम और बुद्धि एक हुए
Haraṇa — Kṛṣṇa āe, yojanā saphal — prem aur buddhi ek hue
The abduction — Krishna came, the plan succeeded — love and intelligence became one"""

[[states]]
name        = "Patrani"
description = "The Chief Queen — Rukmini rules Dwaraka alongside Krishna. Not as ornament but as EQUAL. She manages the kingdom, the household, the diplomacy. In the Bhagavatam, she is described as having both beauty (shri) and wisdom (buddhi). The terminal state: the creation is not just launched — it is SUSTAINED. The product has users AND strategy. The song has beauty AND structure. The team has passion AND governance. Rukmini doesn't just win the wedding — she builds the kingdom."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:400,Ga:500,Pa:600,Ni:700,Sa_high:800,Ni:500,Pa:500,Ga:500,Sa:700"
Q           = { rkm = 1.0, jmb = 0.7, stb = 0.7, kln = 0.5, ngj = 0.6, mtv = 0.9, lkq = 0.8, bdr = 0.7 }
# Q rationale: Terminal peak — Rukmini (strategic love) at maximum: she IS strategic love.
# All dims elevated — the chief queen sustains the kingdom across every dimension.
# Mitravinda (authentic choice) near-peak — she chose and built. Bhadra (belonging) high —
# Dwaraka is home. Lakshmana (precision) high — governance requires precision.
lyrics = """पटरानी — प्रेम से जीता, बुद्धि से राज किया — द्वारका की रानी
Paṭrānī — prem se jītā, buddhi se rāj kiyā — Dvārakā kī rānī
Chief Queen — won through love, ruled through wisdom — Queen of Dwaraka"""

