guard  = "disease OR dullness OR doubt OR laziness OR craving"
action = "diagnose_specific_antaraya; log_which_of_nine"
drishti = ["present", "down"]
# present: which of nine obstacles? down: root cause of the block?

[[transitions]]
from   = "Pratyahara"
to     = "Antaraya"
event  = "obstacle_arises"
guard  = "disease OR dullness OR doubt OR laziness OR craving"
action = "diagnose_specific_antaraya; log_which_of_nine"
drishti = ["present", "down"]
# present: which of nine obstacles? down: root cause of the block?

[[transitions]]
from   = "Dharana"
to     = "Antaraya"
event  = "obstacle_arises"
guard  = "disease OR dullness OR doubt OR laziness OR craving"
action = "diagnose_specific_antaraya; log_which_of_nine"
drishti = ["present", "down"]
# present: which of nine obstacles? down: root cause of the block?

[[transitions]]
from   = "Antaraya"
to     = "Vikshepa"
event  = "symptoms_manifest"
guard  = "pain OR despair OR trembling OR irregular_breathing"
action = "log_symptoms; correlate_with_antaraya"
drishti = ["present", "down"]
# present: are symptoms manifesting? down: which antaraya is active?

[[transitions]]
from   = "Vikshepa"
to     = "Vyutthana"
event  = "practice_abandoned"
guard  = "will_broken AND method_rejected"
action = "full_reset; preserve_samskara_residue"
drishti = ["present", "past"]
# present: is will broken? past: how far did we get before collapse?

[[transitions]]
from   = "Antaraya"
to     = "Yama"
event  = "remedy_applied"
guard  = "specific_remedy_for_specific_obstacle AND practice_resumed"
action = "return_to_last_stable_limb; log_recovery"
drishti = ["present", "past", "future"]
# present: is remedy applied? past: which obstacle was it? future: will practice resume?

[[transitions]]
from   = "Vikshepa"
to     = "Yama"
event  = "eka_tattva_abhyasa"
guard  = "single_focus_chosen AND sustained_effort"
action = "stabilize_through_one_pointed_practice"
drishti = ["present", "up"]
# present: is single focus chosen? up: is the method still valid?

# Kashaya — deep impressions resurface during advanced practice
[[transitions]]
from   = "Dhyana"
to     = "Kashaya"
event  = "samskaras_surface"
guard  = "deep_memory_activated AND old_patterns_arise"
action = "witness_without_engaging; log_impression_type"
drishti = ["present", "past", "down"]
# present: are samskaras surfacing? past: what old pattern? down: how deep is the impression?

[[transitions]]
from   = "Kashaya"
to     = "Dhyana"
event  = "impression_witnessed"
guard  = "samskara_seen_and_released AND equanimity_maintained"
action = "continue_meditation; decrement_kashaya_strength"
drishti = ["present", "silence"]
# present: has the impression been witnessed? silence: has equanimity returned?

[[transitions]]
from   = "Kashaya"
to     = "Antaraya"
event  = "impression_overwhelms"
guard  = "equanimity_lost AND old_pattern_reactivated"
action = "fall_back_to_obstacle_handling"
drishti = ["present", "down"]
# present: has the impression overwhelmed? down: which obstacle is triggered?
