# HaridasFsm — Pure Music Devotion: The Silence Between Notes
# v1.0
#
# मैं तो कुंज गली में, सुनूँ वंशी की ध्वनि
# Main to kunj gali mein, sunun vanshi ki dhwani
# (I dwell in the lane of groves, listening to the flute's sound)
#
# Swami Haridas — Tansen's guru, founder of the Haridasi sampradaya.
# He lived in Vrindavan and sang only for Krishna. Not for courts,
# not for kings, not for fame. When Emperor Akbar wanted to hear him,
# Tansen said: "I sing because the king commands. My guru sings
# because God compels. The difference is everything."
#
# Akbar disguised himself as a commoner and went to Vrindavan.
# When he heard Haridas sing, he wept and said: "This is what
# music was meant to be."
#
# In engineering and creative work he is:
#   - The silence between notes that makes music possible
#   - The whitespace in code that makes it readable
#   - The restraint that makes power elegant
#   - The artist who never ships for likes — only for truth
#   - The code that does ONE thing perfectly
#   - The song with three notes that destroys one with three hundred
#
# In Rishi's creative engine:
#   Haridas generates INTIMATE, MINIMAL compositions — songs
#   stripped to their essence. Where Tansen uses power, Haridas
#   uses silence. Where Meera uses passion, Haridas uses purity.
#   His songs are whispered, not shouted. They enter through
#   stillness, not force.
#
# CRITICAL DISTINCTION:
#   Tansen COMMANDS through raga — his music changes weather.
#   Haridas SURRENDERS through raga — his music changes the listener.
#   Tansen performs FOR someone. Haridas performs for no one.
#   The difference: Tansen is the greatest musician in the court.
#   Haridas is the greatest musician who left the court.
#
# Cross-coupling:
#   - TansenFsm: student-teacher. Tansen's power came from Haridas's
#     purity. When Tansen's fire (Deepak raga) is burning too hot,
#     only Haridas's Megh Malhar can cool it. Power needs purity.
#   - MeeraFsm: both devotees, different expressions. Meera composes
#     with passion and fire. Haridas composes with stillness and space.
#     Together they cover the full spectrum of bhakti expression.
#   - NaradFsm: Narad carries knowledge through worlds. Haridas
#     stays in one grove and lets the world come to him.
#     Narad is the traveling teacher; Haridas is the still center.
#   - SaraswatiFsm: Saraswati is knowledge of music. Haridas is
#     the practice that transcends knowledge. He doesn't analyze
#     the raga — he becomes the raga.
#   - RadhaFsm: Haridas sang of Radha-Krishna's divine love in
#     Vrindavan. Radha's harmony and Haridas's purity are the
#     same thing expressed differently.
#
# Raga: Sarang — the raga of the afternoon, of longing without
#   desperation, of the peacock that dances not for an audience
#   but because the rain is coming. Pure, unhurried, luminous.

