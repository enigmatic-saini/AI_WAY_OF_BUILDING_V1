# -- States -------------------------------------------------------

[[states]]
name        = "Abhimana"
description = "Sacred Pride — Satyabhama's pride is not vanity. It is the fire that refuses to accept less than the best. She demanded the Parijata tree because she DESERVED it. In creative work: the refusal to ship mediocre work. The standard that says 'this is not good enough.' Pride that drives quality, not ego."
is_initial  = true
is_terminal = false
audio_phrase = "Ma_tivra:500,Dha:600,Ni:500,Sa_high:600,Ni:500,Dha:500,Ma_tivra:600"
Q           = { rkm = 0.2, jmb = 0.1, stb = 0.5, kln = 0.1, ngj = 0.2, mtv = 0.4, lkq = 0.1, bdr = 0.1 }
# Q rationale: Sacred pride — Satyabhama (fierce pride) already strong at inception.
# Mitravinda (authentic choice) moderate — pride IS choosing not to settle.
lyrics = """अभिमान — गर्व नहीं, गौरव — मैं कम पर राज़ी नहीं
Abhimān — garv nahīṁ, gaurav — maiṁ kam par rāzī nahīṁ
Pride — not vanity but dignity — I will not settle for less"""

[[states]]
name        = "Rana_Bhumi"
description = "The Battlefield — Satyabhama doesn't send an army. She GOES herself. She stands on the chariot beside Krishna against Narakasura. In creative work: don't delegate the hard fight. Go personally. Write the difficult code yourself. Sing the impossible note yourself. Be ON the battlefield, not behind the command tent."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Ma_tivra:400,Pa:500,Dha:400,Ni:500,Sa_high:600,Ni:400,Dha:400,Pa:500"
Q           = { rkm = 0.3, jmb = 0.4, stb = 0.7, kln = 0.0, ngj = 0.4, mtv = 0.6, lkq = 0.3, bdr = 0.3 }
# Q rationale: Battlefield — Satyabhama (fierce pride) high: she's ON the chariot.
# Jambavati (endurance) rising — battle demands stamina. Kalindi (patience) zero — action time.
# Mitravinda (authentic choice) high — she chose to fight personally.
lyrics = """रणभूमि — रथ पर सवार, कृष्ण के संग — मैं भी लड़ूँगी
Raṇabhūmi — rath par savār, Kṛṣṇa ke saṅg — maiṁ bhī laḍūṅgī
Battlefield — mounted on the chariot with Krishna — I too will fight"""

[[states]]
name        = "Shara_Sandhana"
description = "The Arrow — when Krishna 'faints' (his leela), Satyabhama takes the bow and fires the killing arrow at Narakasura. The moment SHE becomes the hero. Not the supporting role — the MAIN role. In creative work: the moment you stop waiting for permission and take the shot. The junior who fixes the P0 when the senior is unavailable. The backup singer who hits the note the lead missed."
is_initial  = false
is_terminal = false
audio_phrase = "Ni:400,Sa_high:500,Re_high:400,Ga_high:500,Re_high:400,Sa_high:600,Ni:500,Dha:600"
Q           = { rkm = 0.4, jmb = 0.5, stb = 0.9, kln = 0.0, ngj = 0.6, mtv = 0.7, lkq = 0.8, bdr = 0.3 }
# Q rationale: The arrow — Satyabhama (fierce pride) near-peak: SHE is the hero.
# Lakshmana (precision) high: one arrow, one kill. Nagnajiti (impossible spec) rising:
# killing a demon the hero couldn't. Kalindi zero — pure action, no contemplation.
lyrics = """शर सन्धान — कृष्ण गिरे, मैंने धनुष उठाया — नरकासुर मरा
Śara sandhān — Kṛṣṇa gire, maiṁne dhanuṣ uṭhāyā — Narakāsur marā
The arrow drawn — Krishna fell, I lifted the bow — Narakasura died"""

[[states]]
name        = "Parijata"
description = "The Celestial Tree — Satyabhama demanded the Parijata tree from Indra's heaven. Krishna fought Indra for it. Some call this vanity. But the Parijata is the tree whose flowers never fade — the symbol of eternal creation. In creative work: demanding the BEST tools, the best framework, the best infrastructure. Not as luxury — as necessity. The artist who says 'I need the best piano' and deserves it because they'll make it sing."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:400,Ga:500,Pa:600,Dha:700,Ni:600,Sa_high:700,Dha:500,Pa:500,Ga:500,Sa:600"
Q           = { rkm = 0.5, jmb = 0.6, stb = 0.8, kln = 0.1, ngj = 0.7, mtv = 0.8, lkq = 0.5, bdr = 0.4 }
# Q rationale: Demanding the best — Satyabhama (fierce pride) high: she DESERVES the Parijata.
# Nagnajiti (impossible spec) high: demanding a celestial tree IS the impossible.
# Mitravinda (authentic choice) high: she chose the best and refuses less.
lyrics = """पारिजात — स्वर्ग से वृक्ष माँगा, क्योंकि मैं योग्य हूँ
Pārijāta — svarg se vṛkṣa māṅgā, kyoṁki maiṁ yogya hūṁ
Parijata — I demanded the tree from heaven, because I am worthy"""

[[states]]
name        = "Vijaya"
description = "Victory — Narakasura dead, Parijata obtained, 16,000 captive women freed. Satyabhama's fierce pride resulted in liberation for thousands. The terminal state: pride channeled into action that liberates. Not pride for self — pride that FREES OTHERS. The song so powerful it breaks chains."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:300,Ga:400,Pa:500,Ni:600,Sa_high:700,Pa:500,Ga:500,Sa:500,Ga:600,Pa:700,Sa_high:900"
Q           = { rkm = 0.7, jmb = 0.7, stb = 1.0, kln = 0.2, ngj = 0.7, mtv = 0.9, lkq = 0.7, bdr = 0.7 }
# Q rationale: Terminal peak — Satyabhama (fierce pride) at maximum: pride that liberated 16,000.
# All dims elevated by victory. Mitravinda (authentic choice) near-peak: she chose to fight,
# chose to demand, chose to free. Bhadra (belonging) high: 16,000 now belong to freedom.
lyrics = """विजय — नरकासुर मरा, सोलह हज़ार मुक्त — गर्व ने मुक्ति दी
Vijay — Narakāsur marā, solah hazār mukt — garv ne mukti dī
Victory — Narakasura slain, sixteen thousand freed — pride gave liberation"""

