# SatyabhamaFsm — Fierce Pride Channeled: The Queen Who Slew Narakasura
# v1.0
#
# सत्यभामा — गर्व से लड़ी, गर्व से जीती
# Satyabhāmā — garv se laḍī, garv se jītī
# (Satyabhama — fought with pride, won with pride)
#
# Satyabhama — daughter of Satrajit, the most fiery and proud
# of Krishna's queens. She is NOT the docile wife. She is the
# warrior-queen who ACCOMPANIED Krishna to battle Narakasura
# and — in the Bhagavata Purana — it was HER arrow that killed
# the demon when Krishna pretended to faint.
#
# She demanded the Parijata tree from Indra's heaven. Krishna
# went to war with INDRA for her. She was jealous, proud,
# competitive (especially with Rukmini), and magnificent.
#
# The lesson: pride is not sin when channeled into action.
# Satyabhama's pride drove her to kill demons, challenge gods,
# and demand the impossible. She is the fire that DOES something.
#
# In engineering and creative work she is:
#   - The artist who says "I deserve better" and then PROVES it
#   - The engineer who takes the impossible bug personally and crushes it
#   - The creative pride that refuses mediocrity
#   - The competitive fire that pushes the team higher
#   - The song that DEMANDS to be heard — not through marketing but through power
#   - The feature request that becomes "I'll build it myself"
#
# In Rishi's creative engine:
#   Satyabhama generates FIERCE, PROUD, COMBAT-READY compositions.
#   Anthems of power. Songs where the singer sounds like they could
#   fight a demon between verses. Her music has fire, aggression,
#   and the particular electricity of someone who refuses to lose.
#
# Raga: Puriya Dhanashree — intense, fiery, proud. The raga
#   that sounds like a queen riding into battle with flowers in her hair.

