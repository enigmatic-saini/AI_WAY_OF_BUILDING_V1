# -- States -------------------------------------------------------

[[states]]
name        = "Chamaar_Ghat"
description = "The Cobbler's Lane — Ravidas at his workshop, making shoes, touching leather, 'polluted' by birth. The world says he is unworthy. In creative work: the starting point of zero credentials. No degree. No connections. No platform. No audience. Just skill and truth. The lane where nobody looks. The GitHub with zero stars. The song uploaded to nobody. But the work is happening."
is_initial  = true
is_terminal = false
audio_phrase = "Sa:600,Re:500,Ga:600,Re:400,Sa:700"
Q           = { rkm = 0.1, jmb = 0.3, stb = 0.2, kln = 0.3, ngj = 0.0, mtv = 0.2, lkq = 0.3, bdr = 0.1 }
# Q rationale: Cobbler's lane — Jambavati (endurance) moderate: honest daily labor.
# Lakshmana (precision): making shoes well requires craft. Bhadra low: the world excludes him.
lyrics = """चमार घाट पर बैठा हूँ, जूते सीता हूँ — प्रभु भी यहीं हैं
Camār ghāṭ par baiṭhā hūṁ, jūte sītā hūṁ — Prabhu bhī yahīṁ haiṁ
I sit at the cobbler's ghat, I stitch shoes — God too is here"""

[[states]]
name        = "Kathauthi"
description = "The Washbasin — 'Man changa to kathauthi mein Ganga.' If the heart is pure, the Ganga flows in your washbasin. The Brahmins go to the river to purify. Ravidas finds purity at home. In creative work: you don't need the right tools, the right studio, the right degree. If the craft is true, the kitchen table is a concert hall. The purity is in the work, not the workspace."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:400,Ga:500,Ma:400,Pa:500,Ga:400,Re:400,Sa:600"
Q           = { rkm = 0.3, jmb = 0.4, stb = 0.3, kln = 0.5, ngj = 0.1, mtv = 0.5, lkq = 0.3, bdr = 0.3 }
# Q rationale: Washbasin — Kalindi (purity) moderate: purity found at home, not the river.
# Mitravinda (authentic choice) moderate: choosing to find God in the washbasin. Jambavati: daily labor continues.
lyrics = """कठौती में गंगा बहे — मन चंगा तो सब चंगा
Kaṭhautī meṁ Gaṅgā bahe — man caṅgā to sab caṅgā
The Ganga flows in the washbasin — if the heart is pure, all is pure"""

[[states]]
name        = "Begumpura"
description = "The City Without Sorrow — Ravidas's utopian vision. A city with no pain, no tax, no hierarchy, no 'first' or 'second' citizen. Everyone equal. In creative work: the product that serves ALL users equally. The song that speaks for everyone who was never spoken for. The architecture with no privileged class, no admin backdoor, no 'enterprise-only' feature. Begumpura is the design spec for justice."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:400,Re:400,Ga:500,Ma:400,Pa:500,Dha:400,Ni:500,Sa_high:600"
Q           = { rkm = 0.6, jmb = 0.5, stb = 0.5, kln = 0.4, ngj = 0.5, mtv = 0.7, lkq = 0.4, bdr = 0.7 }
# Q rationale: Begumpura — Bhadra (belonging) high: the vision of a city where ALL belong.
# Mitravinda (authentic choice) high: designing equality by choice. Nagnajiti moderate:
# a classless society IS the impossible spec.
lyrics = """बेगमपुरा शहर को नाउँ — दुख अन्दोह नहीं तहि ठाउँ
Begampurā śahar ko nāuṁ — dukh andoh nahīṁ tahi ṭhāuṁ
The city is named Begumpura — there is no sorrow or grief there"""

[[states]]
name        = "Prabhu_Juke"
description = "Bowing to God — but GOD BOWS BACK. In the legend, when Ravidas offered flowers at Jagannath temple and was turned away, the deity himself accepted the offering over the Brahmins' heads. In creative work: the moment the world recognizes what it rejected. The contribution accepted. The song that breaks through. The proof that quality cannot be gatekept forever. God doesn't check your caste. Neither does truth."
is_initial  = false
is_terminal = false
audio_phrase = "Pa:500,Dha:500,Ni:600,Sa_high:700,Ni:500,Dha:500,Pa:600,Ma:500,Ga:600"
Q           = { rkm = 0.7, jmb = 0.6, stb = 0.6, kln = 0.5, ngj = 0.4, mtv = 0.7, lkq = 0.5, bdr = 0.7 }
# Q rationale: God bows back — Rukmini (strategic love) high: quality overcomes gatekeeping.
# Satyabhama (pride) moderate: pride in work that cannot be denied. Bhadra high: God includes the excluded.
lyrics = """प्रभु झुके जहाँ भक्त झुका — जाति पूछे न प्रभु, प्रेम पूछे
Prabhu jhuke jahāṁ bhakt jhukā — jāti pūche na Prabhu, prem pūche
God bows where the devotee bows — God asks not caste, but love"""

[[states]]
name        = "Amritbani"
description = "The Immortal Word — Ravidas's verses enter the Guru Granth Sahib. A cobbler's words sit alongside Guru Nanak's. The ultimate proof: truth has no caste, no credential, no gatekeep. In creative work: the terminal state where the work speaks for itself. The function that everyone imports. The song that outlives the artist. The poem that enters the canon. Nobody asks what caste the poet was. They only ask: is it true?"
is_initial  = false
is_terminal = true
audio_phrase = "Sa:400,Ga:500,Pa:600,Sa_high:700,Pa:500,Ga:500,Sa:600,Re:500,Ga:500,Pa:600,Sa_high:800"
Q           = { rkm = 0.8, jmb = 0.7, stb = 0.7, kln = 0.6, ngj = 0.5, mtv = 0.8, lkq = 0.6, bdr = 0.9 }
# Q rationale: Terminal — Bhadra (belonging) near-peak: the cobbler's word in scripture = universal belonging.
# Mitravinda high: authentic voice that entered the canon. All dims elevated by the journey from exclusion to immortality.
lyrics = """अमृतबानी — चमार का शब्द ग्रन्थ में, सत्य की कोई जाति नहीं
Amṛtbānī — camār kā śabd granth meṁ, satya kī koī jāti nahīṁ
Immortal Word — the cobbler's verse in the scripture, truth has no caste"""

