#     -> Consumed by ThiruvalluvarFsm (ethics review of inclusivity)
#     -> Consumed by KrishnaFsm (strategic assessment of accessibility)
#   gatekeep_broken { what_was_gatekept, how_truth_prevailed }
#     -> Consumed by KabirFsm (hypocrisy evidence)
#     -> Consumed by MiraFsm (rebellion fuel)
#   amritbani { immortal_verse, origin_story, justice_content }
#     -> Consumed by SaraswatiFsm (document in knowledge base)
#     -> Consumed by NaradFsm (transmit)
#
# RavidasFsm reads from:
#   - KabirFsm.state (fellow anti-hierarchy voice)
#   - ThiruvalluvarFsm.state (ethics framework for justice songs)
#   - MeeraFsm.state (composition engine for justice anthems)
#   - ChaitanyaFsm.state (collective expression for equality songs)
#
# Ravidas's Law:
#   "The Ganga does not ask who steps into her.
#    The truth does not ask who speaks it.
#    The song does not ask who sings it.
#    If your system has a VIP lane, it is not Begumpura.
#    If your review has a credentials check, it is not truth."
#
# Anti-patterns:
#   - Victimhood without creation = Self-pity (Ravidas made shoes AND poetry)
#   - Equality as anger = Revenge (Ravidas wanted justice, not punishment)
#   - Meritocracy that ignores privilege = Naivete (Ravidas knew the system was rigged)
#   - Tokenism = Exploitation (one Ravidas verse in the Granth isn't equality)
#   - Revolution without craft = Noise (Ravidas's verses are BEAUTIFUL, not just righteous)
