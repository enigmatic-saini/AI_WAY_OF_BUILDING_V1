# PrahladFsm — Fearless Devotion Under Fire
# v1.0
#
# प्रह्लाद बोले: नारायण! नारायण!
# Prahlad bole: Narayan! Narayan!
#
# Bhakt Prahlad — the five-year-old son of demon king Hiranyakashipu
# who refused to stop chanting Vishnu's name despite every torture:
# thrown from cliffs, trampled by elephants, fed poison, burned alive.
# Nothing worked. The fire that was meant to kill him burned his aunt
# Holika instead. The pillar that was meant to mock his faith split
# open and Narasimha emerged.
#
# In engineering and creative work he is:
#   - The conviction that survives every pressure test
#   - The feature request that refuses to die despite every "not now"
#   - The truth that no amount of management pressure can suppress
#   - The junior dev who says "this is wrong" when seniors disagree
#   - The song that must be sung regardless of who is listening
#   - The creative vision that endures rejection after rejection
#
# In Rishi's creative engine:
#   Prahlad generates DEFIANT ANTHEMS — songs born from persecution
#   that become stronger with every attempt to silence them.
#   His lyrics carry the energy of "you cannot stop this voice."
#   When the user feels crushed, silenced, or dismissed — Prahlad
#   sings the song that refuses to die.
#
# CRITICAL DISTINCTION from other Bhakti FSMs:
#   Mira REBELS — she chooses to defy convention through love.
#   Kabir STRIPS — he removes hypocrisy through wit.
#   Prahlad ENDURES — he doesn't rebel or strip; he simply
#   refuses to stop. His devotion is not defiance — it is
#   an inability to be anything other than devoted.
#   The fire cannot burn what is already made of fire.
#
# Cross-coupling:
#   - MiraFsm: Mira chose rebellion; Prahlad had no choice.
#     Both refuse to bend, but Mira dances while Prahlad stands.
#     Mira → Prahlad: when rebellion needs unshakeable spine.
#     Prahlad → Mira: when endurance needs joyful expression.
#   - KabirFsm: Kabir exposes hypocrisy; Prahlad exposes tyranny.
#     Kabir's weapon is the doha; Prahlad's weapon is the Name.
#   - NaradFsm: Narad was Prahlad's first guru — he taught the
#     child Vishnu's name while still in the womb. Narad plants
#     the seed; Prahlad is the tree that no storm uproots.
#   - HanumanFsm: both are devotees of Vishnu/Ram. Hanuman
#     serves through action; Prahlad serves through presence.
#     Hanuman leaps; Prahlad stands still. Both are immovable.
#   - MeeraFsm: Meera's composition engine can channel Prahlad's
#     energy for songs about surviving persecution and emerging
#     stronger. Prahlad provides the emotional fuel; Meera
#     provides the musical structure.
#   - ShivaFsm: when Prahlad's endurance reveals that the
#     oppressor (legacy system, bad architecture) must be
#     destroyed, Shiva completes what Narasimha started.
#
# Raga: Darbari Kanada — the raga of the royal court, gravitas,
#   deep night, and unshakeable dignity. Prahlad stood before
#   the most powerful demon king and did not flinch. Darbari
#   carries that weight — slow, majestic, immovable.

