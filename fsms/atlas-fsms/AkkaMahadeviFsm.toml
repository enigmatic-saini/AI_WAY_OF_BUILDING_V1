# -- Cross-coupling signals ----------------------------------------
#
# AkkaMahadeviFsm emits:
#   cage_identified { what_binds, why_comfortable, cost_of_staying }
#     -> Consumed by MiraFsm (rebellion fuel)
#     -> Consumed by ShivaFsm (what needs destroying)
#   vachana { raw_truth, stripped_statement, no_ornamentation }
#     -> Consumed by KabirFsm (anti-hypocrisy evidence)
#     -> Consumed by NagarjunaFsm (minimalism validation)
#   mantapa_verdict { what_survived_scrutiny, what_didn't }
#     -> Consumed by KrishnaFsm (strategic insight from tested truth)
#     -> Consumed by SaraswatiFsm (document the finding)
#
# AkkaMahadeviFsm reads from:
#   - ShivaFsm.state (destruction energy for renunciation)
#   - MiraFsm.state (rebellion — different flavor, same direction)
#   - KabirFsm.state (anti-pretense — Akka's fiercest ally)
#   - NagarjunaFsm.state (emptiness as design principle)
#
# Akka's Law:
#   "If you can still add something, it is not truth.
#    If you can still hide something, it is not truth.
#    Strip until there is nothing left to strip.
#    What remains is either truth or nothing.
#    If nothing remains — you were nothing but decoration."
#
# Anti-patterns:
#   - Stripping for shock value = Performance (Akka was not performing)
#   - Minimalism as laziness = Incompleteness (Akka's vachanas are COMPLETE, just minimal)
#   - Rawness without depth = Crude (her simplicity carries centuries of realization)
#   - Renunciation as avoidance = Cowardice (she faced the parliament, not hid from it)
#   - Nakedness as ideology = Dogma (her nudity was specific to HER truth, not a rule)
