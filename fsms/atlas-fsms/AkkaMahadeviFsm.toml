# -- States -------------------------------------------------------

[[states]]
name        = "Bandhan"
description = "Bondage — Akka trapped in a marriage she didn't choose. The palace is golden, the cage is invisible. In creative work: trapped in a framework, a job, a pattern, a 'best practice' that feels wrong but everyone accepts. The first state is recognizing the cage. You can't escape what you can't see."
is_initial  = true
is_terminal = false
audio_phrase = "Sa:600,Re:500,Ga_komal:600,Ma:500,Pa:600"
Q           = { rkm = 0.1, jmb = 0.1, stb = 0.2, kln = 0.1, ngj = 0.0, mtv = 0.0, lkq = 0.0, bdr = 0.2 }
# Q rationale: Bondage — nearly everything suppressed. Mitravinda zero: no authentic choice yet.
# Satyabhama slight: the first recognition that something is wrong. The cage is still invisible.
lyrics = """ಬಂಧನ — ಚಿನ್ನದ ಪಂಜರ, ಆದರೂ ಪಂಜರ
Bandhan — cinnada pañjara, ādarū pañjara
Bondage — a golden cage, but still a cage"""

[[states]]
name        = "Tyaga"
description = "Renunciation — Akka leaves. Not gradually. Not politely. She walks out of the marriage, the palace, and her clothes. Everything goes. In creative work: the moment you delete the framework. Rewrite from scratch. Say 'this is all wrong' and mean it. Tyaga is not incremental improvement — it is the courage to start from zero. The artist who burns the comfortable career. The delete key as spiritual practice."
is_initial  = false
is_terminal = false
audio_phrase = "Ma:500,Pa:600,Dha_komal:500,Ni_komal:600,Sa_high:700,Ni_komal:500,Dha_komal:500"
Q           = { rkm = 0.2, jmb = 0.4, stb = 0.7, kln = 0.0, ngj = 0.3, mtv = 0.8, lkq = 0.1, bdr = 0.0 }
# Q rationale: Renunciation — Mitravinda (authentic choice) high: walking out IS the ultimate choice.
# Satyabhama (fierce pride) high: stripping everything requires fierce courage.
# Bhadra zero: she abandoned all belonging. Kalindi zero: this is action, not patience.
lyrics = """ತ್ಯಾಗ — ಎಲ್ಲ ಬಿಟ್ಟೆ, ಏನೂ ಉಳಿಯಲಿಲ್ಲ — ಸತ್ಯ ಮಾತ್ರ ಉಳಿಯಿತು
Tyāga — ella biṭṭe, ēnū uḷiyalilla — satya mātra uḷiyitu
Renunciation — I left everything, nothing remained — only truth survived"""

[[states]]
name        = "Vachana"
description = "The Prose-Poem — Akka's weapon. Short, direct, no ornamentation. Each vachana is a punch. 'O brothers, my body is not my body, it is Shiva's body.' In creative work: the commit message that says exactly what happened. The error message that tells the truth. The song lyric with no metaphor — just the raw statement. Vachanas don't explain — they declare."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:300,Ma:400,Pa:500,Sa_high:600,Pa:400,Ma:400,Sa:500"
Q           = { rkm = 0.3, jmb = 0.5, stb = 0.8, kln = 0.1, ngj = 0.4, mtv = 0.8, lkq = 0.6, bdr = 0.1 }
# Q rationale: The vachana — Lakshmana (precision) high: each vachana is a punch, no wasted words.
# Mitravinda (authentic choice) high: raw truth by choice. Satyabhama high: vachanas are fierce declarations.
lyrics = """ವಚನ — ಒಂದೇ ಮಾತು, ಒಂದೇ ಸತ್ಯ — ಹೆಚ್ಚು ಏಕೆ?
Vacana — ondē mātu, ondē satya — heccu ēke?
Vachana — one word, one truth — why more?"""

[[states]]
name        = "Anubhava_Mantapa"
description = "The Parliament of Experience — Basavanna's assembly where mystics debated. Akka walked in naked and silenced them all with the power of her realization. In creative work: the code review where your PR has zero lines of unnecessary code and the reviewers have no comments. The demo so pure it needs no slides. The argument so clean it needs no defense. Anubhava Mantapa is where truth is tested by other truths."
is_initial  = false
is_terminal = false
audio_phrase = "Pa:400,Dha_komal:500,Ni_komal:600,Sa_high:700,Ni_komal:500,Pa:500,Ma:400,Ga_komal:500"
Q           = { rkm = 0.5, jmb = 0.6, stb = 0.9, kln = 0.2, ngj = 0.6, mtv = 0.9, lkq = 0.7, bdr = 0.3 }
# Q rationale: Parliament — Satyabhama near-peak: naked truth silencing scholars requires ultimate courage.
# Mitravinda near-peak: the most authentic self, tested by the greatest minds.
# Lakshmana high: truth survives scrutiny only if it is precise.
lyrics = """ಅನುಭವ ಮಂಟಪ — ನಗ್ನ ಸತ್ಯ ಮುಂದೆ, ಪಂಡಿತರು ಮೌನ
Anubhava Maṇṭapa — nagna satya munde, paṇḍitaru mauna
In the Parliament of Experience — before naked truth, the scholars fall silent"""

[[states]]
name        = "Chennamallikarjuna"
description = "Lord White as Jasmine — Akka's name for Shiva. She dissolves into her beloved. The naked body that was her last possession is now also gone. In creative work: the code that is so minimal it disappears. The design so transparent it becomes invisible. The song so true it stops being a song and becomes the truth itself. There is nothing left to strip. There is nothing left to renounce. Only the essential remains."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:500,Ga_komal:600,Pa:700,Sa_high:800,_:400,Pa:600,Ga_komal:600,Sa:900"
Q           = { rkm = 0.6, jmb = 0.7, stb = 0.7, kln = 0.5, ngj = 0.5, mtv = 1.0, lkq = 0.8, bdr = 0.4 }
# Q rationale: Terminal — Mitravinda at maximum: Akka IS the fieriest authentic choice ever made.
# Lakshmana near-peak: nothing remains but the load-bearing truth. The code that is so minimal it disappears.
# Satyabhama high: fierce to the end. Kalindi moderate: dissolution brings stillness.
lyrics = """ಚೆನ್ನಮಲ್ಲಿಕಾರ್ಜುನ — ನಾನು ಅಲ್ಲ, ನೀನು ಅಲ್ಲ — ಸತ್ಯ ಮಾತ್ರ
Cennamallikārjuna — nānu alla, nīnu alla — satya mātra
Lord White as Jasmine — not I, not you — only truth"""

