# MitravindaFsm — Self-Choice Against Family: Swayamvar Courage
# v1.0
#
# मित्रविन्दा — परिवार ने रोका, हृदय ने चुना
# Mitravindā — parivār ne rokā, hṛday ne cunā
# (Mitravinda — family blocked, the heart chose)
#
# Mitravinda — princess of Avantika (Ujjain). She chose Krishna
# in her swayamvar AGAINST her brothers' wishes. Her brothers
# Vinda and Anuvinda supported Duryodhana and tried to prevent
# her from choosing Krishna. She chose anyway.
#
# Krishna took her by force from the swayamvar when her brothers
# tried to stop the marriage. The princess who made her own choice
# and had a partner who backed that choice with action.
#
# The lesson: sometimes the family, the team, the establishment
# says "no." And the right answer is to choose anyway.
# Self-choice (swa-vara: one's own choice) is the most sacred
# act when it comes from genuine love, not rebellion for its own sake.
#
# In creative work: the artist who chooses their own direction
# despite the label, the manager, the market. The developer who
# picks the right technology against the team's comfort zone.
# The song that is written the way the heart demands, not the
# way the producer demands.
#
# Raga: Bihag — the late-night raga of independent beauty.
#   It walks its own melodic path. Playful, free, gentle but
#   absolutely certain of its direction.

