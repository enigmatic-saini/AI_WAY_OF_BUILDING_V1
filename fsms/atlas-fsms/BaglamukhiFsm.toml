# BaglamukhiFsm — Stambhana (Immobilization) & Emergency Stop
# v1.0
#
# Om Hleem Baglamukhyai Namah
#
# Maa Baglamukhi wields the Stambhana Shakti — the power to freeze,
# paralyze, and silence. She grabs the tongue of the demon Madan and
# strikes with her golden club. She does NOT destroy (that is Shiva's
# domain) — she STOPS. The enemy is frozen, then dealt with calmly.
#
# In engineering she is:
#   - The circuit breaker that trips before cascading failure
#   - The kill switch that halts a runaway process
#   - The rate limiter that blocks floods before they drown the system
#   - The feature flag that disables a broken feature instantly
#   - The quarantine mechanism that isolates compromised components
#
# She is the guardian of LAW 0 in WORK_CULTURE.md — she ensures all
# laws are remembered and followed. When a law is violated, she does
# not punish — she freezes the violating action until it can be
# reviewed. LAW 4 references her directly.
#
# CRITICAL DISTINCTION from ShivaFsm:
#   Shiva DESTROYS — dissolves the old to make way for the new.
#   Baglamukhi FREEZES — immobilizes the threat so it can be examined.
#   Always freeze first, then decide whether to destroy or heal.
#   Destruction without assessment is recklessness.
#   Freezing without follow-up is neglect.
#   The sequence is: Baglamukhi stops it, then Shiva or Vishnu decides
#   whether to destroy or sustain.
#
# Cross-coupling:
#   - ShaktiFsm: energy source for the stambhana mechanism. Without
#     shakti, the freeze has no force. Baglamukhi draws from Shakti
#     to power her immobilization.
#   - KhatuShyamFsm: the navigator dispatches here when a situation
#     requires emergency stop review. Khatu Shyam sees the threat on
#     the battlefield; Baglamukhi is the arrow that freezes it.
#   - LakshmanFsm: the sentinel who detects anomalies. Lakshman's
#     vigilance feeds Baglamukhi's Drishti state — he spots it, she
#     stops it.
#   - ShivaFsm: if the freeze is insufficient — if the threat is so
#     fundamental that immobilization cannot hold — Shiva is invoked
#     for full dissolution. Baglamukhi → Shiva is the escalation path.
#   - MonitoringCircuitBreakerFsm: technical implementation of the
#     circuit breaker pattern. Baglamukhi is the divine principle;
#     MonitoringCircuitBreaker is the engineering mechanism.
#   - RateLimitingFsm: implements the rate-limiting aspect of
#     stambhana at the technical layer.
#
# The Stambhana self-loop (Stambhana → Stambhana):
#   Sometimes the first stop mechanism fails. The process resists the
#   freeze. The circuit breaker trips but the current finds another
#   path. In such cases, a stronger mechanism is needed: escalate from
#   soft stop → hard stop → kill -9 → power cut. Each retry in the
#   self-loop applies a stronger immobilization. If all fail, escalate
#   to ShivaFsm for destruction.
#
# Raga: Bhairav — morning raga of alertness and protective power.
#   Yellow/gold energy motifs (Baglamukhi's color). Percussive,
#   sudden stops in audio representing the stambhana moment.

