# ── Transitions ──────────────────────────────────────────────

# Sthiti → Drishti: anomaly surfaces, begin assessment
[[transitions]]
from   = "Sthiti"
to     = "Drishti"
event  = "anomaly_detected"
guard  = "harmful_pattern_observed"
action = "activate_monitoring; classify_anomaly_severity; alert_sentinel; log_drishti_entry"
drishti = ["present", "down", "left", "right"]
# present: what anomaly was detected? down: where in the system? left/right: scan for scope of the anomaly.

# Sthiti → Jihva_Grahana: FAST PATH for critical emergencies
# Skip assessment — the threat is so obvious or critical that
# immediate target lock is required. Used for declared emergencies,
# known-bad signatures, or cascading failures already in progress.
[[transitions]]
from   = "Sthiti"
to     = "Jihva_Grahana"
event  = "emergency_declared"
guard  = "immediate_threat"
action = "skip_assessment; lock_known_target; escalate_priority; log_fast_path_activation"
drishti = ["present", "down"]
# present: emergency declared — act now. down: lock on the known target immediately.

# Drishti → Sthiti: false alarm, return to baseline calm
[[transitions]]
from   = "Drishti"
to     = "Sthiti"
event  = "false_alarm"
guard  = "anomaly_benign"
action = "clear_alert; record_false_alarm_for_tuning; restore_baseline; log_false_alarm"
drishti = ["present", "silence"]
# present: confirmed benign. silence: return to baseline calm — the spring re-coils.

# Drishti → Jihva_Grahana: threat confirmed, begin targeting
[[transitions]]
from   = "Drishti"
to     = "Jihva_Grahana"
event  = "threat_confirmed"
guard  = "severity_assessed"
action = "identify_threat_source; prepare_kill_switch; notify_stakeholders; log_threat_confirmation"
drishti = ["present", "down", "future"]
# present: threat confirmed. down: identify the exact source. future: prepare the kill switch — what will the freeze affect?

# Jihva_Grahana → Stambhana: target locked, execute the freeze
[[transitions]]
from   = "Jihva_Grahana"
to     = "Stambhana"
event  = "target_locked"
guard  = "kill_switch_ready"
action = "execute_stambhana; trip_circuit_breaker; disable_feature_flag; block_rate_limiter; log_freeze_initiated"
drishti = ["present", "down"]
# present: execute the freeze NOW. down: verify the freeze is holding in the system.

# Jihva_Grahana → Jihva_Grahana: SELF-LOOP for multiple threats
# One tongue grabbed, another demon speaks. Additional harmful
# sources discovered during targeting. Each iteration adds a target
# to the freeze list. All must be identified before the freeze.
[[transitions]]
from   = "Jihva_Grahana"
to     = "Jihva_Grahana"
event  = "multiple_sources"
guard  = "additional_tongue_found"
action = "add_target_to_freeze_list; re_scan_for_more_sources; log_additional_target"
drishti = ["present", "left", "right"]
# present: another tongue found. left/right: scan for additional sources of harm.

# Stambhana → Mugdara_Prahara: freeze confirmed, assess damage
[[transitions]]
from   = "Stambhana"
to     = "Mugdara_Prahara"
event  = "freeze_confirmed"
guard  = "assessing_damage"
action = "verify_freeze_holding; snapshot_system_state; begin_damage_assessment; log_freeze_success"
drishti = ["present", "down", "past"]
# present: is the freeze confirmed? down: snapshot system state. past: what damage occurred before the freeze?

# Stambhana → Stambhana: SELF-LOOP — freeze failed, escalate mechanism
# soft stop failed → try hard stop → try kill -9 → try power cut.
# Each iteration applies a stronger immobilization mechanism.
# If all mechanisms exhausted, next step is ShivaFsm for destruction.
[[transitions]]
from   = "Stambhana"
to     = "Stambhana"
event  = "freeze_failed"
guard  = "retry_stronger_mechanism"
action = "escalate_stop_mechanism; increment_retry_count; check_escalation_limit; log_freeze_retry"
drishti = ["present", "up"]
# present: freeze failed — what mechanism to try next? up: escalate strength (soft -> hard -> kill -9 -> power cut).

# Stambhana → Jihva_Grahana: wrong target frozen, re-identify
# We froze the wrong process/service. The real threat continues.
# Release the wrongly frozen target and go back to identification.
[[transitions]]
from   = "Stambhana"
to     = "Jihva_Grahana"
event  = "wrong_target"
guard  = "re_identify"
action = "release_wrong_target; clear_freeze_state; re_scan_for_real_threat; log_misidentification"
drishti = ["present", "past", "left", "right"]
# present: wrong target frozen. past: what went wrong in identification? left/right: re-scan for the real threat.

# Mugdara_Prahara → Quarantine: damage assessed, isolate the threat
[[transitions]]
from   = "Mugdara_Prahara"
to     = "Quarantine"
event  = "damage_assessed"
guard  = "isolate_threat"
action = "move_to_quarantine_namespace; revoke_network_access; disable_triggers; log_isolation"
drishti = ["present", "down", "left", "right"]
# present: damage assessed — isolate now. down: move to quarantine. left/right: revoke all access paths.

# Quarantine → Shanti_Scan: isolation confirmed, begin sweep
[[transitions]]
from   = "Quarantine"
to     = "Shanti_Scan"
event  = "isolation_confirmed"
guard  = "quarantine_verified"
action = "begin_secondary_threat_scan; check_downstream_dependencies; audit_related_systems; log_scan_start"
drishti = ["present", "left", "right", "down", "silence"]
# present: quarantine verified. left/right/down: sweep everywhere for secondary threats. silence: in the quiet, hidden threats become audible.

# Shanti_Scan → Jihva_Grahana: secondary threat found — loop back
# The silence scan revealed another threat. Go back to tongue grab
# to identify and target it. This creates the outer loop:
# Jihva_Grahana → Stambhana → ... → Shanti_Scan → Jihva_Grahana
[[transitions]]
from   = "Shanti_Scan"
to     = "Jihva_Grahana"
event  = "secondary_threat_found"
guard  = "new_threat_identified"
action = "register_secondary_threat; reset_freeze_pipeline; notify_escalation; log_secondary_threat"
drishti = ["present", "down"]
# present: secondary threat found. down: loop back to identify and target it.

# Shanti_Scan → Vimochana: all clear, plan the release
[[transitions]]
from   = "Shanti_Scan"
to     = "Vimochana"
event  = "all_clear"
guard  = "plan_restart_or_removal"
action = "declare_all_clear; begin_release_planning; prepare_conditions_checklist; log_all_clear"
drishti = ["present", "future"]
# present: all clear confirmed. future: plan the controlled restart — what conditions must be met?

# Vimochana → Sthiti: controlled restart successful
[[transitions]]
from   = "Vimochana"
to     = "Sthiti"
event  = "controlled_restart_successful"
guard  = "restart_conditions_met"
action = "execute_controlled_restart; verify_health; restore_monitoring; update_baseline; log_restart"
drishti = ["present", "down", "silence"]
# present: restart conditions met. down: verify health. silence: return to baseline calm with new wisdom.

# Vimochana → Stambhana_Verdict: permanent removal or audit complete
[[transitions]]
from   = "Vimochana"
to     = "Stambhana_Verdict"
event  = "permanent_removal_or_audit_complete"
guard  = "removal_executed_or_audit_finalized"
action = "record_stambhana_audit; emit_verdict; archive_quarantine_data; log_verdict"
drishti = ["present", "past", "future"]
# present: audit finalized. past: the full threat lifecycle documented. future: lessons applied to prevent recurrence.

# Stambhana_Verdict → Sthiti: system returns to calm with new baseline
[[transitions]]
from   = "Stambhana_Verdict"
to     = "Sthiti"
event  = "new_baseline"
guard  = "system_returns_to_calm"
action = "update_kill_switch_inventory; apply_lessons_learned; reset_to_new_baseline; log_return_to_sthiti"
drishti = ["present", "future", "silence"]
# present: new baseline established. future: stronger defenses. silence: the goddess sits calm again — club ready.

# ── Cross-coupling signals ───────────────────────────────────
#
# BaglamukhiFsm emits:
#   stambhana_activated { target, mechanism, severity, timestamp }
#     → Consumed by ShaktiFsm (energy draw), KhatuShyamFsm (audit trail)
#   escalation_to_shiva { target, failed_mechanisms, damage_report }
#     → Consumed by ShivaFsm when freeze is insufficient and destruction
#       is required. This is the last resort.
#   stambhana_verdict { threat_id, detection_time, freeze_time,
#     hold_success, damage_before_freeze, secondary_threats,
#     quarantine_effective, release_plan }
#     → Consumed by KhatuShyamFsm for cycle audit, ThoughtCycleFsm
#       for learning.
#
# BaglamukhiFsm reads from:
#   - LakshmanFsm.state (sentinel anomaly signals feed Drishti)
#   - ShaktiFsm.state (energy available for stambhana mechanism)
#   - MonitoringCircuitBreakerFsm.state (technical circuit breaker status)
#   - RateLimitingFsm.state (rate limiter status and thresholds)
#   - KhatuShyamFsm.dispatch (when navigator routes emergency here)
#
# LAW 0 Guardian Role:
#   BaglamukhiFsm is invoked whenever a WORK_CULTURE law violation is
#   detected. She does not punish — she freezes the violating action,
#   forces a review, and only releases when the law is understood and
#   the action is corrected. This is LAW 4's mechanism in action:
#   "Baglamukhi guards LAW 0 — she ensures all laws are remembered."
