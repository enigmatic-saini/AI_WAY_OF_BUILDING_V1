# NaradFsm — Harmony, Knowledge Transmission & Collaborative Creation
# v2.0 — Three-cycle refinement applied:
#   Cycle 1: Added harmonic maps + automated verification for faster checks
#   Cycle 2: Dynamic harmonic templates, user-defined flexibility
#   Cycle 3: Multi-user collaboration, live coding, social sharing
#
# Narada's veena harmonizes all things. This FSM tracks:
# - Knowledge gathering and transmission (original purpose)
# - Harmonic analysis and real-time verification (Cycle 1)
# - Collaborative creation where multiple users build harmony together (Cycle 3)
# Bliss is coherence — when all voices align without losing individuality.

[meta]
name    = "NaradFsm"
domain  = "music-knowledge"
version = "2.1"
parent  = "NaradFsm@1.0"
persist = "persistent"

# ── States ───────────────────────────────────────────────────────

[[states]]
name        = "Sanchara"
description = "Wandering — gathering musical material. Listening to inputs from multiple sources. The veena hums, scanning for patterns."
is_initial  = true
is_terminal = false
Q           = { rkm = 0.4, jmb = 0.2, stb = 0.2, kln = 0.3, ngj = 0.3, mtv = 0.4, lkq = 0.3, bdr = 0.3 }
# Q rationale: Mitravinda (self-choice) — choosing where to wander.
# Raga Malkauns palette: Sa Ga_komal Ma Dha_komal Ni_komal (pentatonic — no Re, no Pa)
# Sanchara: wandering — Narada's veena probing, restless search across Malkauns
audio_phrase = "Ni_mandra:400,Sa:350,Ga_komal:400,Ma:350,Ga_komal:300,Sa:400,Ni_mandra:450,Sa:350,Ma:400,Ga_komal:500"
lyrics = """नारद चले लोक लोक, वीणा संग
Nārad chale lok lok, vīṇā saṅg
Narad wanders world to world, veena in hand"""

[[states]]
name        = "Shravana"
description = "Deep listening — absorbing harmonic content. Audio analysis active: key detection, chord recognition, melodic contour mapping."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.5, jmb = 0.3, stb = 0.2, kln = 0.6, ngj = 0.2, mtv = 0.3, lkq = 0.5, bdr = 0.4 }
# Q rationale: Kalindi (patience) high — deep listening requires stillness.
# Shravana: deep listening — long sustained notes, absorbing each swara's resonance
audio_phrase = "Sa:700,Ga_komal:600,Ma:800,Ga_komal:600,Sa:500,Ni_mandra:700,Sa:900"
lyrics = """सुनो सुनो, स्वर में सत्य छिपा
Suno suno, svar meṁ satya chipā
Listen, listen — truth hides within the notes"""

[[states]]
name        = "Manthan"
description = "Churning — processing collected harmony. Matching against dynamic harmonic templates. Finding consonance and dissonance patterns."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.5, jmb = 0.4, stb = 0.3, kln = 0.5, ngj = 0.4, mtv = 0.3, lkq = 0.6, bdr = 0.4 }
# Q rationale: Lakshmana (precision) — pattern matching against templates.
# Manthan: churning — circular patterns, oscillating phrases, samudra-manthan energy
audio_phrase = "Ga_komal:300,Ma:300,Dha_komal:350,Ma:300,Ga_komal:300,Ma:350,Dha_komal:300,Ni_komal:400,Dha_komal:300,Ma:350,Ga_komal:300,Sa:400,Ga_komal:350,Ma:500"
lyrics = """मन्थन चले, सागर मथे, अमृत निकले
Manthan chale, sāgar mathe, amṛt nikle
The churning proceeds — the ocean is churned, nectar emerges"""

[[states]]
name        = "Harmonic_Map"
description = "Template selection — choosing or generating a harmonic map for verification. Predefined templates (raga-based, Western, hybrid) or user-defined custom maps."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.5, jmb = 0.3, stb = 0.3, kln = 0.5, ngj = 0.4, mtv = 0.5, lkq = 0.7, bdr = 0.4 }
# Q rationale: Lakshmana (precision) high — harmonic template selection.
# Harmonic_Map: template laying — systematic intervals, mapping the harmonic space
audio_phrase = "Sa:400,Ga_komal:400,Sa:350,Ma:400,Ga_komal:350,Dha_komal:400,Ma:350,Ni_komal:400,Dha_komal:350,Sa_high:500"
lyrics = """स्वर का नक्शा बिछाओ, राग का रूप दिखाओ
Svar kā nakśā bichāo, rāg kā rūp dikhāo
Lay out the map of notes — reveal the raga's form"""

[[states]]
name        = "Verification"
description = "Automated harmony check — real-time analysis against selected map. Consonance ratio, voice-leading quality, tension-resolution balance scored."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.4, jmb = 0.4, stb = 0.4, kln = 0.4, ngj = 0.3, mtv = 0.4, lkq = 0.8, bdr = 0.4 }
# Q rationale: Lakshmana (precision) peaks — automated harmony check.
# Verification: checking consonance — consonant pairs tested, Sa-Ma, Ga-Dha intervals
audio_phrase = "Sa:300,Ma:300,Ga_komal:300,Dha_komal:300,Ma:300,Ni_komal:350,Dha_komal:300,Ma:350,Ga_komal:300,Sa:500"
lyrics = """परखो, जाँचो, सत्य और असत्य अलग करो
Parkho, jāñcho, satya aur asatya alag karo
Test, examine — separate truth from untruth"""

[[states]]
name        = "Katha"
description = "Teaching — transmitting harmonic knowledge through narrative examples. 'Listen how Sa and Pa relate' not 'the fifth interval is consonant'."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.7, jmb = 0.3, stb = 0.3, kln = 0.5, ngj = 0.3, mtv = 0.4, lkq = 0.5, bdr = 0.7 }
# Q rationale: Rukmini (love) and Bhadra (belonging) high — teaching through narrative.
# Katha: teaching — stepwise pedagogy, each swara introduced and connected, storytelling pace
audio_phrase = "Sa:400,Ga_komal:350,Sa:300,Ga_komal:300,Ma:350,Ga_komal:300,Ma:300,Dha_komal:350,Ma:300,Dha_komal:300,Ni_komal:350,Dha_komal:300,Sa_high:500,Ni_komal:350,Dha_komal:350,Ma:300,Ga_komal:350,Sa:500"
lyrics = """कथा सुनो री, ज्ञान की बाती जले
Kathā suno rī, jñān kī bātī jale
Hear the story — the lamp of knowledge burns"""

[[states]]
name        = "Provocation"
description = "Disruption — Narada introduces deliberate dissonance to test understanding. 'What happens if we flatten the third?' The gadfly stirs."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.3, jmb = 0.3, stb = 0.6, kln = 0.2, ngj = 0.5, mtv = 0.7, lkq = 0.4, bdr = 0.2 }
# Q rationale: Mitravinda (authentic rebellion) peaks — the gadfly stirs.
# Provocation: Narada the gadfly — unexpected intervals, alien swaras intruding on Malkauns
audio_phrase = "Ma_tivra:400,Ni_komal:500,Re:400,Dha_komal:350,Ma_tivra:500,Ga_komal:400,Re_komal:350,Ma:400,Ga_komal:500,Sa:600"
lyrics = """नारद नारद, कलह कराओ, सत्य दिखाओ!
Nārad Nārad, kalah karāo, satya dikhāo!
Narad, Narad — stir the conflict, reveal the truth!"""

[[states]]
name        = "Samvad"
description = "Dialogue — collaborative creation. Multiple users or voices contributing. Live coding environment active. Each participant's voice tracked."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.6, jmb = 0.4, stb = 0.3, kln = 0.5, ngj = 0.4, mtv = 0.5, lkq = 0.5, bdr = 0.7 }
# Q rationale: Bhadra (belonging) high — collaborative creation, multiple voices.
# Samvad: dialogue — call and response, two voices alternating, question-answer
audio_phrase = "Ga_komal:350,Ma:300,Dha_komal:400,Ma:300,Ga_komal:350,Sa:300,Ga_komal:400,Ma:300,Ni_komal:350,Dha_komal:300,Ma:400,Ga_komal:350,Sa:500"
lyrics = """बोलो और सुनो, संवाद में सत्य मिले
Bolo aur suno, saṁvād meṁ satya mile
Speak and listen — truth is found in dialogue"""

[[states]]
name        = "Sangam"
description = "Confluence — all voices aligned. Harmony verified across all participants. Individual expression preserved within collective coherence."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.7, jmb = 0.5, stb = 0.5, kln = 0.6, ngj = 0.5, mtv = 0.6, lkq = 0.6, bdr = 0.9 }
# Q rationale: Bhadra (belonging) peaks — all voices aligned, confluence.
# Sangam: confluence — all voices merging, parallel phrases converging to unison
audio_phrase = "Sa:300,Ga_komal:300,Ma:300,Dha_komal:300,Ni_komal:350,Sa_high:400,Ni_komal:300,Dha_komal:300,Ma:300,Ga_komal:300,Sa:400,Ga_komal:350,Ma:400,Sa:600"
lyrics = """सब स्वर मिले, सब मन मिले, संगम भया
Sab svar mile, sab man mile, saṅgam bhayā
All notes united, all hearts united — confluence achieved"""

[[states]]
name        = "Narada_Smriti"
description = "Codification — the harmony crystallized into a reusable template. New harmonic map created from the session. Knowledge preserved as sutra."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.6, jmb = 0.5, stb = 0.4, kln = 0.6, ngj = 0.4, mtv = 0.5, lkq = 0.7, bdr = 0.6 }
# Q rationale: Lakshmana (precision) — crystallizing harmony into reusable template.
# Narada_Smriti: codification — crystallizing the session's wisdom into a sutra phrase
audio_phrase = "Sa:350,Ma:350,Dha_komal:400,Ni_komal:350,Sa_high:500,Ni_komal:350,Dha_komal:350,Ma:400,Ga_komal:350,Sa:500,Ga_komal:400,Ma:500"
lyrics = """सूत्र लिखो, स्मृति रखो, आने वालों के लिये
Sūtra likho, smṛti rakho, āne vāloṁ ke liye
Write the sutra, keep the memory — for those yet to come"""

[[states]]
name        = "Ananda"
description = "Bliss — coherence achieved. All harmony scores above threshold. Collaborative alignment confirmed. The veena and all voices sing as one."
is_initial  = false
is_terminal = true
Q           = { rkm = 0.8, jmb = 0.5, stb = 0.5, kln = 0.7, ngj = 0.6, mtv = 0.7, lkq = 0.6, bdr = 0.9 }
# Q rationale: Bhadra (belonging) near peak — all harmony scores pass.
# Rukmini (love) — Narayan Narayan, the veena sings.
# Ananda: bliss — Malkauns resolution, all pentatonic swaras in harmony, veena singing
audio_phrase = "Sa:400,Ga_komal:350,Ma:400,Dha_komal:350,Ni_komal:400,Sa_high:500,Ni_komal:350,Dha_komal:350,Ma:400,Ga_komal:350,Sa:500,Ga_komal:400,Sa:900"
lyrics = """नारायण नारायण, वीणा गाये, आनन्द छाये
Nārāyaṇ Nārāyaṇ, vīṇā gāye, ānand chāye
Narayan, Narayan — the veena sings, bliss prevails"""

[[states]]
name        = "Mauna"
description = "Sacred silence — integration. Session data saved. Harmonic discoveries stored for adaptive future use. Rest before the next journey."
is_initial  = false
is_terminal = false
Q           = { rkm = 0.3, jmb = 0.2, stb = 0.1, kln = 0.8, ngj = 0.1, mtv = 0.2, lkq = 0.2, bdr = 0.4 }
# Q rationale: Kalindi (patience) peaks — sacred silence, integration.
# Rest before the next journey.

# ── Transitions ──────────────────────────────────────────────────

[[transitions]]
from  = "Sanchara"
to    = "Shravana"
event = "input_detected"
guard = "audio_or_notation_available"
drishti = ["present", "down"]
# present: is input detected? down: what material is available?

[[transitions]]
from  = "Shravana"
to    = "Manthan"
event = "enough_material"
guard = "minimum_phrases_collected"
drishti = ["present", "up"]
# present: enough material? up: what patterns emerge?

[[transitions]]
from  = "Manthan"
to    = "Harmonic_Map"
event = "pattern_needs_template"
guard = "harmonic_structure_ambiguous"
drishti = ["present", "left", "right"]
# present: is structure ambiguous? left/right: which template fits?

[[transitions]]
from  = "Manthan"
to    = "Verification"
event = "pattern_clear"
guard = "template_already_loaded"
drishti = ["present", "up"]
# present: pattern clear? up: template already loaded.

[[transitions]]
from  = "Harmonic_Map"
to    = "Verification"
event = "template_selected"
guard = "map_is_valid"
drishti = ["present", "down"]
# present: is map valid? down: begin verification.

[[transitions]]
from  = "Harmonic_Map"
to    = "Harmonic_Map"
event = "user_customizes"
guard = "user_modifies_template"
drishti = ["present", "left", "right"]
# present: user customizes? left/right: what modifications?

[[transitions]]
from  = "Verification"
to    = "Katha"
event = "harmony_explained"
guard = "teaching_mode_active"
drishti = ["present", "future"]
# present: harmony explained? future: teaching mode.

[[transitions]]
from  = "Verification"
to    = "Samvad"
event = "collaboration_starts"
guard = "multiple_participants_present"
drishti = ["present", "left", "right"]
# present: multiple participants? left/right: who contributes?

[[transitions]]
from  = "Verification"
to    = "Provocation"
event = "dissonance_introduced"
guard = "narada_tests_understanding"
drishti = ["present", "down"]
# present: test understanding? down: introduce dissonance.

[[transitions]]
from  = "Verification"
to    = "Sangam"
event = "harmony_passes"
guard = "consonance_above_80_and_voice_leading_clean"
drishti = ["present", "up", "silence"]
# present: harmony passes? up: voices coherent? silence: alignment achieved.

[[transitions]]
from  = "Verification"
to    = "Manthan"
event = "harmony_fails"
guard = "consonance_below_60"
drishti = ["present", "past"]
# present: harmony fails? past: re-churn the material.

[[transitions]]
from  = "Provocation"
to    = "Samvad"
event = "disruption_sparks_dialogue"
guard = "participants_engage"
drishti = ["present", "left", "right"]
# present: disruption sparked dialogue? left/right: who engages?

[[transitions]]
from  = "Provocation"
to    = "Verification"
event = "dissonance_resolved"
guard = "resolution_found"
drishti = ["present", "up"]
# present: is dissonance resolved? up: re-verify harmony.

[[transitions]]
from  = "Katha"
to    = "Samvad"
event = "student_questions"
guard = "dialogue_opens"
drishti = ["present", "future"]
# present: student questions? future: dialogue opens.

[[transitions]]
from  = "Katha"
to    = "Sanchara"
event = "teaching_done"
guard = "lesson_received"
drishti = ["present", "silence"]
# present: teaching done? silence: lesson received, wander again.

[[transitions]]
from  = "Samvad"
to    = "Sangam"
event = "voices_align"
guard = "all_participants_in_harmony"
drishti = ["present", "up", "silence"]
# present: voices aligning? up: all in harmony? silence: convergence.

[[transitions]]
from  = "Samvad"
to    = "Provocation"
event = "stagnation_detected"
guard = "creativity_needs_disruption"
drishti = ["present", "down"]
# present: stagnation detected? down: creativity needs disruption.

[[transitions]]
from  = "Sangam"
to    = "Ananda"
event = "bliss_achieved"
guard = "harmony_scores_pass_and_all_voices_coherent"
drishti = ["present", "up", "silence"]
# present: harmony complete? up: all scores pass? silence: bliss.

[[transitions]]
from  = "Sangam"
to    = "Narada_Smriti"
event = "codify_harmony"
guard = "session_worth_preserving"
drishti = ["present", "future"]
# present: worth preserving? future: codify for those yet to come.

[[transitions]]
from  = "Narada_Smriti"
to    = "Mauna"
event = "sutra_written"
guard = "template_saved"
drishti = ["present", "silence"]
# present: sutra written? silence: rest.

[[transitions]]
from  = "Narada_Smriti"
to    = "Ananda"
event = "wisdom_crystallized"
guard = "codification_is_bliss"
drishti = ["present", "up"]
# present: codification is bliss? up: wisdom crystallized.

[[transitions]]
from  = "Mauna"
to    = "Sanchara"
event = "rest_complete"
guard = "veena_calls_again"
drishti = ["present", "future"]
# present: rest complete? future: veena calls again.

[[transitions]]
from  = "Ananda"
to    = "Sanchara"
event = "new_journey"
guard = "curiosity_returns"
drishti = ["present", "future"]
# present: curiosity returns? future: new journey begins.

# ── Collaborative transitions (Cycle 3) ─────────────────────────

[[transitions]]
from  = "Samvad"
to    = "Samvad"
event = "new_participant_joins"
guard = "collaboration_accepts_new_voice"
drishti = ["present", "left", "right"]
# present: new participant joins? left/right: welcome the new voice.

[[transitions]]
from  = "Sangam"
to    = "Samvad"
event = "share_externally"
guard = "community_sharing_enabled"
drishti = ["present", "left", "right"]
# present: share externally? left/right: community sharing enabled.
