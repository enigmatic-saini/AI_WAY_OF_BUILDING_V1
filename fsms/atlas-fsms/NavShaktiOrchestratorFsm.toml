# NavShaktiOrchestratorFsm — The Grand Conductor of the Nine Shakti Forms
# v1.0
#
# Jai Maa Durga! Jai Navdurga!
#
# This is the orchestrator FSM for the complete Nav Shakti audit — the
# 36-cycle Shakti review (tag: NS*). Maa Durga in her complete Navdurga
# manifestation: 9 nights, 9 energies, 9 reviews.
#
# ─── How It Works ───────────────────────────────────────────────
#
# The orchestrator does NOT perform any review itself. It sequences and
# dispatches the 9 individual Nav Shakti FSMs:
#
#   NS1 → ShailaputriFsm     (Foundation & Grounding)
#   NS2 → BrahmachariniFsm   (Discipline & Austerity)
#   NS3 → ChandraghantaFsm   (Battle Readiness)
#   NS4 → KushmandaFsm       (Cosmic Energy & Creation)
#   NS5 → SkandamataFsm      (Nurturing & Protection)
#   NS6 → KatyayaniFsm       (Warrior Courage)
#   NS7 → KaalratriFsm       (Destruction of Darkness)
#   NS8 → MahagauriFsm       (Purity & Cleansing)
#   NS9 → SiddhidatriFsm     (Mastery & Perfection)
#
# ─── Two Modes ──────────────────────────────────────────────────
#
# 1. GRAND MODE (full Navratri): All 9 forms run sequentially.
#    Each form must complete and record its verdict before the next
#    begins. This is the full 36-cycle audit — thorough, exhaustive,
#    and transformative. Used for major milestones, releases, or
#    deep system health checks.
#
# 2. TARGETED MODE (single/specific forms): The orchestrator jumps
#    directly from Invocation to a specific form (or subset). Once
#    those complete, it skips to Shakti_Unified for consolidation.
#    Used when KhatuShyamFsm identifies a specific NS* need.
#
# ─── Findings Accumulation ──────────────────────────────────────
#
# Each form FSM emits a verdict object when it completes:
#   { form: "NS1", verdict: "pass|warn|fail", findings: [...], score: 0-100 }
#
# The orchestrator accumulates these in a session-scoped findings
# register. When all requested forms complete, Shakti_Unified reads
# the full register and produces the consolidated Nav Shakti Report.
#
# ─── Cross-Coupling ────────────────────────────────────────────
#
# Parent: ShaktiFsm
#   This orchestrator draws energy from the primordial Shakti. Before
#   dispatching any form, it checks ShaktiFsm.state — if Shakti is
#   Latent or Spent, the orchestrator waits for energy to be Aroused
#   or Channeled before proceeding.
#
# KhatuShyamFsm (the Navigator):
#   KhatuShyamFsm may dispatch here when its Arrow_One identifies an
#   NS* cycle as the primary need. In targeted mode, Khatu Shyam
#   specifies which form(s) to run. In grand mode, the full sequence
#   is triggered by explicit user request or milestone event.
#
# ThoughtCycleFsm:
#   The consolidated report from Shakti_Unified feeds back into
#   ThoughtCycleFsm to update system health metrics.
#

