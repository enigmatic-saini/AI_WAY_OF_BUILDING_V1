to     = "Visarjan"
event  = "report_consolidated"
guard  = "unified_report_generated AND grand_verdict_declared"
action = "emit_nav_shakti_report; archive_findings; notify_thought_cycle; log_consolidation_done"
drishti = ["present", "up", "silence"]
# present: is report consolidated? up: grand verdict declared? silence: the puja concludes.

# ─── Cycle Reset ───────────────────────────────────────────────

# Visarjan → Invocation: new puja requested (new audit cycle)
[[transitions]]
from   = "Visarjan"
to     = "Invocation"
event  = "new_puja_requested"
guard  = "previous_findings_archived"
action = "clear_session_state; reset_findings_register; log_new_cycle_requested"
drishti = ["present", "future"]
# present: are previous findings archived? future: new puja begins.

# ── Cross-coupling signals ───────────────────────────────────
#
# INBOUND:
#   - KhatuShyamFsm.Dispatch → Invocation (when Arrow_One selects NS*)
#     KhatuShyam passes: { mode: "targeted", forms: [N], mission: "..." }
#     or: { mode: "grand", mission: "full system audit" }
#
#   - ShaktiFsm.state → guards on all dispatch transitions
#     Energy must be Aroused or Channeled before any form begins.
#     If Shakti is Latent/Spent, orchestrator waits at current state.
#
# OUTBOUND:
#   - Each form_Active dispatches to its respective sub-FSM:
#     Shailaputri_Active  → ShailaputriFsm.start
#     Brahmacharini_Active → BrahmachariniFsm.start
#     Chandraghanta_Active → ChandraghantaFsm.start
#     Kushmanda_Active     → KushmandaFsm.start
#     Skandamata_Active    → SkandamataFsm.start
#     Katyayani_Active     → KatyayaniFsm.start
#     Kaalratri_Active     → KaalratriFsm.start
#     Mahagauri_Active     → MahagauriFsm.start
#     Siddhidatri_Active   → SiddhidatriFsm.start
#
#   - Shakti_Unified emits: nav_shakti_report_ready
#     { forms_reviewed: [...], composite_score: N, grand_verdict: "...", findings: [...] }
#     Consumed by ThoughtCycleFsm to update system health.
#
#   - Visarjan emits: nav_shakti_puja_complete
#     Consumed by ShaktiFsm (energy returns to Spent → Latent cycle).
#
# FINDINGS REGISTER FORMAT:
#   findings_register = [
#     { form: "NS1", name: "Shailaputri", verdict: "pass|warn|fail", score: 0-100, findings: [...] },
#     { form: "NS2", name: "Brahmacharini", verdict: "...", score: N, findings: [...] },
#     ...up to NS9
#   ]
#   In targeted mode, only requested forms appear in the register.
#   Composite score = weighted average (all forms equal weight in grand mode).
