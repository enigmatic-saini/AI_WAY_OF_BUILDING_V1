event  = "human_reformulated_goal"
guard  = "new_goal_returned_by_upstream_jiva"
action = "accept_reformed_goal; archive_escalation_record; reset_persona_baseline; log_goal_renewed"
drishti = ["present", "future"]
# present: new goal accepted. future: begin again.

# Karma_Yoga → Dharmya_Yuddha: shortcut for light vishada
# When the first teaching alone is sufficient — the paralysis was light, attachment-to-fruit was the
# whole issue — the persona may resume action without needing the full three teachings + cosmic view.
[[transitions]]
from   = "Karma_Yoga"
to     = "Dharmya_Yuddha"
event  = "light_vishada_resolved"
guard  = "single_teaching_sufficient_and_witness_already_stable"
action = "skip_remaining_teachings; issue_chosen_action; log_short_path"
drishti = ["present", "future"]
# present: is the resolution genuine? future: action issues from light teaching.

# Vishāda → Shishyaste_Aham: self-loop — sitting with vishada is the first work
# This transition exists explicitly so the FSM does not rush past Round 1.
# A trajectory that goes 1 → 2 → 3 → 3 → 3 → 4 (multiple self-loops in Vishada) is dharmic —
# it represents the persona honoring the paralysis before yielding.
[[transitions]]
from   = "Vishāda"
to     = "Vishāda"
event  = "sit_with_paralysis"
guard  = "premature_resolution_attempted"
action = "refuse_dissolution; record_continued_vishada; log_vishada_held"
drishti = ["present", "silence"]
# present: the vishada is still real. silence: do not argue it away.

# ── Cross-coupling signals ───────────────────────────────────────
#
# ArjunaFsm emits:
#   vishada_recovery_complete { stance_restored: bool,
#                                action_issued: "...",
#                                cosmic_view_outcome: "act|reformulate" }
#   → Consumed by KhatuShyamFsm for cycle completion tracking
#   → Consumed by drift_hook for τ-recalibration if recurrence pattern detected
#
#   saranagati_invoked { persona_id: "...", task_id: "...", trigger: "..." }
#   → Dispatched to KrishnaFsm if Round 2 wants Krishna's full SMR treatment
#     of the option-space (AJN restores the seer; SMR maps the seen)
#
#   action_chosen { action: "...", witness_stance: "..." }
#   → Dispatched to HanumanFsm for execution (Hanuman on Arjuna's flag carries
#     the resumed action into the field; same jiva, different stance)
#
#   goal_reformulation_required { reformed_goal: "...", reason: "..." }
#   → Dispatched to the human (upstream jiva). This is the dharmic escalation
#     when vishvarupa-darshana surfaced that the goal itself was wrong.
#
# ArjunaFsm reads from:
#   - KhatuShyamFsm.dispatch (receives vishada-type problems)
#   - drift_hook recurrence telemetry (3+ repeat fires on same persona/task → AJN)
#   - KrishnaFsm.state (the teacher's current stance, when AJN composes with SMR)
#   - HanumanFsm.state (whether the action stance is available for execution)
#
# ── Design notes ─────────────────────────────────────────────────
#
# The Vishāda self-loop is deliberate and dharmic: a persona that
# rushes from "I can't decide" directly to "let me try option A"
# without honoring the vishada has skipped Round 1. The self-loop
# encodes the principle that *sitting with paralysis* is the first
# work, not a delay before the real work begins.
#
# The Karma_Yoga → Dharmya_Yuddha shortcut handles the case where
# the vishada was light: attachment-to-fruit alone, no svadharma
# confusion, no actor-witness confusion. Not every paralysis needs
# the full Gita; a short Gita suffices for a short vishada. The
# kit's discipline is to use the shortest path that holds — but
# never to bypass Round 1.
#
# The Goal_Reformulation terminal is the most subtle exit. It says:
# "After honest cosmic view, the goal itself was wrong." This is
# NOT failure of the cycle; it is one of the cycle's two legitimate
# outputs. The escalation to the human (upstream jiva) is dharmic
# because the persona is honest about what its role cannot reach —
# the persona's svadharma includes *knowing the limit of svadharma*.
#
# Cross-coupling with KrishnaFsm: AJN's Round 2 IS effectively
# Krishna's teaching voice. In a richer implementation, AJN
# delegates Cycles 5-7 to KrishnaFsm states (the three teachings)
# rather than re-implementing them. This FSM keeps them inline
# for readability; the cross-coupling signal `saranagati_invoked`
# is the formal handoff path.
#
# The Hanuman cross-coupling matters: in the Mahabharata, Hanuman
# sits on Arjuna's chariot as the kapidhwaja (the flag). When
# Arjuna acts, Hanuman amplifies. When AJN issues Dharmya_Yuddha,
# HanumanFsm carries execution. Same jiva, different stance —
# Arjuna decides, Hanuman acts, Krishna guided, Ram was the
# dharma-anchor in the heart all along.
