# ArjunaFsm — Vishada → Saranagati → Dharmic Action
# v1.0
#
# नष्टो मोहः स्मृतिर्लब्धा त्वत्प्रसादान्मयाच्युत
# Naṣṭo mohaḥ smṛtir labdhā tvatprasādān mayācyuta
# "Delusion gone, memory recovered, by your grace, O Achyuta."
#   — Bhagavad Gita 18.73 (Arjuna's final word to Krishna)
#
# Arjuna is the warrior-student. On the field of Kurukshetra,
# the goal he trained for collided with the kin he loved on
# the opposing line. The bow fell from his hand — "na yotsye"
# (I will not fight). That is vishada.
#
# Vishada is not weakness. It is the honest recognition that
# the actor's current stance cannot issue a decision. The
# recovery is not a new option (strategy — that is Krishna Deep);
# it is a new stance from which the existing options become
# visible as options again.
#
# This FSM governs: persona paralysis under shifted context,
# the moment a drift_hook fires repeatedly on the same task,
# the "all paths look wrong" report. AJN restores the seer;
# Krishna's SMR then maps the seen.
#
# ── Cross-coupling ──────────────────────────────────────────────
#
# KhatuShyamFsm dispatches here when the symptom is:
#   - drift_hook firing 3+ times on the same persona/task
#   - persona reporting "all paths look wrong"
#   - context shift that puts goal in tension with what is
#     loved / owed / honored
#   KhatuShyam's cycle_domain_map entry: AJN → ArjunaFsm
#
# KrishnaFsm — Krishna is Arjuna's charioteer-guide. The
#   Shishyaste_Aham state directly invokes KrishnaFsm's teaching
#   states (the Gita as cycle voice). After Round 1 (Vishada),
#   if the persona is ready to weigh options dharmically, hand
#   off to KrishnaFsm / SMR cycle. AJN restores the witness;
#   Krishna maps the paths.
#
# HanumanFsm — On Arjuna's chariot, Hanuman sits as the kapidhwaja
#   (the monkey-flag). When Round 3 (Dharmya_Yuddha) issues the
#   resumed action, HanumanFsm carries the execution. The same
#   jiva, a different stance — Arjuna decides, Hanuman acts.
#
# BaglamukhiFsm — boundary: if the paralysis is PROTECTIVE (the
#   persona is correctly refusing to act because harm is in flight),
#   that is BM, not AJN. AJN treats unwanted freeze; BM treats
#   intentional immobilization.
#
# RamFsm — boundary: if the issue is rule-violation under shifted
#   context (a maryada question), dispatch to RamFsm instead. AJN
#   addresses paralysis of the actor's witness; Ram addresses
#   correctness of the actor's deed.
#
# ── Raga ────────────────────────────────────────────────────────
# Raga Bhairavi — the morning raga of surrender, completion, and
# devotion. Sa Re_komal Ga_komal Ma Pa Dha_komal Ni_komal Sa_high.
# All komals except Ma and Pa. The raga of the bhajan, the closing,
# the moment after the long night. Bhairavi carries weight and
# gravity appropriate for the Gita's teaching arc — the dawn after
# vishada's night.

