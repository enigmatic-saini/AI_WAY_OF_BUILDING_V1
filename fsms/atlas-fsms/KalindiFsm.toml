# -- States -------------------------------------------------------

[[states]]
name        = "Yamuna_Tat"
description = "The Riverbank — Kalindi sits by the Yamuna. Not idle — in tapas. Active stillness. The river flows; she sits. In creative work: the contemplation phase. Not rushing to build. Sitting with the problem. Letting the river of subconscious thought flow. The idea will arrive when it's ready. You cannot rush the Yamuna."
is_initial  = true
is_terminal = false
audio_phrase = "Sa:600,Ga:500,Ma:600,Pa:500,Dha:600,Pa:500,Ma:500,Ga:600"
Q           = { rkm = 0.1, jmb = 0.1, stb = 0.0, kln = 0.5, ngj = 0.0, mtv = 0.2, lkq = 0.0, bdr = 0.3 }
# Q rationale: The riverbank — Kalindi (patient contemplation) already moderate: sitting IS her nature.
# Bhadra (belonging) slight: the riverbank is already her home. All action dims near zero.
lyrics = """यमुना तट — बैठी हूँ, बहती है नदी — जो आना है आएगा
Yamunā taṭ — baiṭhī hūṁ, bahtī hai nadī — jo ānā hai āegā
Yamuna's bank — I sit, the river flows — what must come will come"""

[[states]]
name        = "Tapas"
description = "Austerity — Kalindi's tapas is not flashy. No fire, no self-torture. Just sitting. Day after day. Month after month. The sun beats down (she is the Sun's daughter — she is used to heat). In creative work: the years of practice nobody sees. The daily riyaaz. The morning pages. The coding katas. The unglamorous discipline that precedes all mastery."
is_initial  = false
is_terminal = false
audio_phrase = "Sa:500,Ma:600,Pa:700,Ma:500,Ga:500,Ma:600,Pa:700,_:400,Sa:800"
Q           = { rkm = 0.1, jmb = 0.3, stb = 0.0, kln = 0.7, ngj = 0.0, mtv = 0.3, lkq = 0.0, bdr = 0.2 }
# Q rationale: Tapas — Kalindi (patience) rising: day after day of sitting. Jambavati (endurance)
# moderate: tapas requires endurance. All fire/action dims zero: this is stillness, not force.
lyrics = """तपस — न आग, न कष्ट — केवल धैर्य, केवल प्रतीक्षा
Tapas — na āg, na kaṣṭ — keval dhairya, keval pratīkṣā
Tapas — no fire, no suffering — only patience, only waiting"""

[[states]]
name        = "Nadi_Pravah"
description = "The River's Flow — while Kalindi sits still, the river moves. Arjuna and Krishna happen to pass by on a walk. The river brought them. Kalindi didn't go looking — the flow of life delivered. In creative work: serendipity that follows preparation. The lucky break that only comes to those who sat still long enough. The river rewards the patient."
is_initial  = false
is_terminal = false
audio_phrase = "Ga:400,Ma:400,Pa:500,Dha:400,Pa:400,Ma:500,Ga:400,Re:400,Sa:500"
Q           = { rkm = 0.3, jmb = 0.4, stb = 0.1, kln = 0.8, ngj = 0.1, mtv = 0.4, lkq = 0.2, bdr = 0.4 }
# Q rationale: River delivers — Kalindi (patience) high: serendipity rewards the patient.
# Mitravinda (authentic choice) emerging: the river brought what was authentically sought.
lyrics = """नदी प्रवाह — मैं बैठी, नदी ने कृष्ण को लाया — धैर्य का फल
Nadī pravāh — maiṁ baiṭhī, nadī ne Kṛṣṇa ko lāyā — dhairya kā phal
River's flow — I sat still, the river brought Krishna — the fruit of patience"""

[[states]]
name        = "Samarpan"
description = "Surrender — 'I will marry only Vishnu. No one else. Not now, not ever.' This is not a demand — it is a declaration of standard. In creative work: 'I will ship only when it's right. Not before. Not a compromise version.' The discipline of waiting for excellence rather than shipping good-enough."
is_initial  = false
is_terminal = false
audio_phrase = "Pa:500,Dha:600,Ni:700,Sa_high:800,Ni:500,Dha:500,Pa:600"
Q           = { rkm = 0.4, jmb = 0.5, stb = 0.2, kln = 0.9, ngj = 0.2, mtv = 0.6, lkq = 0.3, bdr = 0.4 }
# Q rationale: Surrender — Kalindi (patience) near-peak: the standard is absolute and unhurried.
# Mitravinda (authentic choice) rising: "Only Vishnu" IS self-choice at its purest.
# Jambavati (endurance) moderate: holding the standard requires endurance.
lyrics = """समर्पण — विष्णु ही, और कोई नहीं — यही मेरा मान
Samarpaṇ — Viṣṇu hī, aur koī nahīṁ — yahī merā mān
Surrender — Vishnu alone, no other — this is my standard"""

[[states]]
name        = "Milan"
description = "The Meeting — Krishna takes Kalindi's hand. The patient one is rewarded not because she waited, but because her standard never wavered. In creative work: the creation arrives. Not because you hustled but because you were ready. The song that wrote itself after years of silence. The architecture that crystallized after months of contemplation."
is_initial  = false
is_terminal = true
audio_phrase = "Sa:400,Ga:500,Pa:600,Dha:700,Ni:700,Sa_high:800,Ni:600,Pa:500,Ga:500,Sa:700"
Q           = { rkm = 0.6, jmb = 0.6, stb = 0.3, kln = 1.0, ngj = 0.3, mtv = 0.7, lkq = 0.5, bdr = 0.8 }
# Q rationale: Terminal — Kalindi (patient contemplation) at maximum: she IS patience rewarded.
# Bhadra (belonging) high: the meeting IS arrival at belonging. Mitravinda (authentic choice)
# high: the standard never wavered. All dims elevated by the fruit of patience.
lyrics = """मिलन — प्रतीक्षा समाप्त, धैर्य फला — कृष्ण आए, कालिन्दी मिली
Milan — pratīkṣā samāpt, dhairya phalā — Kṛṣṇa āe, Kālindī milī
Meeting — the wait ends, patience bears fruit — Krishna came, Kalindi was found"""

